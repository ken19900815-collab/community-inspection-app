<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>主管巡檢後台</title>
<style>
  :root{--navy:#111827;--blue:#1d4ed8;--green:#16a34a;--red:#dc2626;--orange:#d97706;--gray:#64748b;--bg:#f1f5f9;--card:#fff;--line:#e2e8f0;}
  *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--navy)}
  header{background:linear-gradient(135deg,#0f172a,#1d4ed8);color:white;padding:28px 18px} header h1{margin:0 0 8px;font-size:28px} header p{margin:0;opacity:.9}
  main{max-width:1100px;margin:auto;padding:16px}.panel,.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 20px rgba(15,23,42,.06);padding:16px;margin:14px 0}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}button{border:0;border-radius:12px;padding:12px 16px;font-weight:800;font-size:15px;cursor:pointer}.b-blue{background:var(--blue);color:#fff}.b-green{background:var(--green);color:#fff}.b-dark{background:#1f2937;color:white}.b-red{background:var(--red);color:white}.b-gray{background:#e5e7eb;color:#111827}
  input,select{border:1px solid #cbd5e1;border-radius:12px;padding:12px;font-size:15px;background:#fff;min-width:210px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:#f8fafc;border-radius:16px;padding:16px}.stat b{display:block;font-size:30px;margin-top:6px}
  .record-title{font-size:24px;font-weight:900}.muted{color:var(--gray)}.badges{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.badge{border-radius:999px;padding:6px 12px;font-weight:800}.ok{background:#dcfce7;color:#166534}.att{background:#fef3c7;color:#92400e}.bad{background:#fee2e2;color:#991b1b}.na{background:#e2e8f0;color:#334155}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}.summary{background:#f8fafc;border-radius:16px;padding:14px;margin:10px 0}.details{display:none;margin-top:12px}.details.open{display:block}.item{border-top:1px solid var(--line);padding:10px 0}.photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.photos img{width:92px;height:92px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
  .notice{padding:12px;border-radius:14px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;margin:12px 0}.empty{text-align:center;color:var(--gray);font-size:20px;padding:30px}.debug{font-size:12px;background:#0f172a;color:#e5e7eb;padding:10px;border-radius:10px;white-space:pre-wrap;overflow:auto;display:none}
  @media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)} input,select{width:100%}.toolbar{display:grid;grid-template-columns:1fr}.toolbar button{width:100%} .record-title{font-size:22px}.actions button{width:100%}}
  @media print{body{background:white}.no-print{display:none!important}.card,.panel{box-shadow:none;border:0}.details{display:block!important} header{background:white;color:black}.print-page{page-break-after:always}.photos img{width:120px;height:120px}}
</style>
</head>
<body>
<header><h1>主管巡檢後台</h1><p>雲端紀錄、異常追蹤、照片查閱、完整 PDF / CSV、真刪除雲端紀錄</p></header>
<main>
  <section class="panel no-print">
    <div class="toolbar">
      <button class="b-blue" onclick="loadRecords(true)">重新整理</button>
      <button class="b-green" onclick="exportCSV()">匯出 CSV</button>
      <button class="b-dark" onclick="printAll()">產生完整 PDF 報告（全部）</button>
      <input id="search" placeholder="搜尋巡檢人員 / 點位 / 項目" oninput="render()" />
      <select id="filter" onchange="render()"><option value="all">全部狀態</option><option value="abnormal">只看異常</option><option value="attention">只看待注意</option></select>
    </div>
    <div id="msg" class="notice" style="display:none"></div>
    <div id="debug" class="debug"></div>
  </section>
  <section class="panel"><div class="stats"><div class="stat">總紀錄<b id="sRecords">0</b></div><div class="stat">總項目<b id="sItems">0</b></div><div class="stat">異常<b id="sAbnormal">0</b></div><div class="stat">待注意<b id="sAttention">0</b></div></div></section>
  <section id="list"></section>
</main>
<script>
let records=[];
let filtered=[];
const $=id=>document.getElementById(id);
function showMsg(t){$('msg').style.display=t?'block':'none';$('msg').textContent=t||''}
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function pick(o,keys,f=''){if(!o||typeof o!=='object')return f;for(const k of keys){const v=o[k];if(v!==undefined&&v!==null&&String(v).trim()!=='')return v}return f}
function itemResult(it){return String(pick(it,['result','status','value','判定結果','判定','檢查結果','狀態'],'')).trim()}
function normItem(it){return {...it,location:pick(it,['location','locationName','巡檢點','點位','區域'],''),category:pick(it,['category','類別'],''),item:pick(it,['item','itemName','點檢項目','項目','name'],''),standard:pick(it,['standard','標準','檢查標準','requirement'],''),result:itemResult(it),note:pick(it,['note','remark','remarks','備註','說明'],''),abnormalNote:pick(it,['abnormalNote','abnormalDescription','異常說明','異常內容'],''),action:pick(it,['action','process','handling','處理方式','改善方式','處理結果'],''),photos:(it.photos||it.photoUrls||it.photoURLs||it.images||it['照片']||[])}}
function normalize(r){const items=(Array.isArray(r.items)?r.items:[]).map(normItem);const c=rx=>items.filter(i=>rx.test(i.result)).length;return {...r,items,inspector:pick(r,['inspector','inspectorName','staffName','userName','name','displayName','lineDisplayName','巡檢人員','填表人員','檢查人員'],'未填人員'),shift:pick(r,['shift','班別'],''),weather:pick(r,['weather','天氣'],''),submittedAt:pick(r,['submittedAt','createdAt','time','timestamp','送出時間','巡檢時間'],''),totalItems:Number(r.totalItems||r.total||items.length||0),normalCount:Number(r.normalCount??r.normal??c(/正常|OK|Normal/i)),attentionCount:Number(r.attentionCount??r.attention??c(/待注意|注意|Attention/i)),abnormalCount:Number(r.abnormalCount??r.abnormal??c(/異常|Abnormal|NG/i)),naCount:Number(r.naCount??r.na??c(/N\/A|NA|不適用/i)),id:r.id||r.recordId||r['紀錄ID']||'',blobUrl:r.blobUrl||'',blobPathname:r.blobPathname||''}}
async function loadRecords(manual=false){try{showMsg(manual?'讀取中...':'');const res=await fetch('/api/getRecords',{cache:'no-store'});const text=await res.text();if(!res.ok)throw new Error(text);let data=JSON.parse(text);if(!Array.isArray(data)) data=data.records||data.data||data.items||[];records=data.map(normalize);showMsg('');render();}catch(e){showMsg('讀取失敗：'+(e.message||e));$('debug').style.display='block';$('debug').textContent=String(e.stack||e)}}
function render(){const q=$('search').value.trim().toLowerCase();const f=$('filter').value;filtered=records.filter(r=>{const hay=JSON.stringify(r).toLowerCase();if(q&&!hay.includes(q))return false;if(f==='abnormal'&&r.abnormalCount<=0)return false;if(f==='attention'&&r.attentionCount<=0)return false;return true});$('sRecords').textContent=filtered.length;$('sItems').textContent=filtered.reduce((s,r)=>s+r.totalItems,0);$('sAbnormal').textContent=filtered.reduce((s,r)=>s+r.abnormalCount,0);$('sAttention').textContent=filtered.reduce((s,r)=>s+r.attentionCount,0);$('list').innerHTML=filtered.length?filtered.map(card).join(''):'<div class="card empty">沒有符合條件的紀錄</div>'}
function card(r,i){const ab=r.items.filter(x=>/異常|待注意|注意/.test(x.result));return `<article class="card print-page" id="rec-${i}"><div class="record-title">${esc(r.inspector)}｜${esc(fmt(r.submittedAt))}</div><div class="muted">班別：${esc(r.shift)}｜天氣：${esc(r.weather)}｜總項目：${r.totalItems}</div><div class="badges"><span class="badge ok">正常 ${r.normalCount}</span><span class="badge att">待注意 ${r.attentionCount}</span><span class="badge bad">異常 ${r.abnormalCount}</span><span class="badge na">N/A ${r.naCount}</span></div><div class="actions no-print"><button class="b-green" onclick="printOne(${i})">本筆完整 PDF</button><button class="b-dark" onclick="toggleDetails(${i})">畫面展開完整明細</button><button class="b-red" onclick="deleteRecord(${i})">刪除紀錄</button></div><div class="summary"><b>異常 / 待注意摘要</b><br>${ab.length?ab.map(x=>`【${esc(x.location)}】${esc(x.item)}：${esc(x.result)} ${esc(x.abnormalNote||x.note||x.action)}`).join('<br>'):'本筆無異常或待注意。'}</div><div class="details" id="details-${i}">${r.items.map(itemHtml).join('')}</div></article>`}
function itemHtml(x){let cls=/異常/.test(x.result)?'bad':/待注意|注意/.test(x.result)?'att':/N\/A|NA|不適用/.test(x.result)?'na':'ok';const photos=Array.isArray(x.photos)?x.photos:[];return `<div class="item"><b>${esc(x.location)}｜${esc(x.category)}｜${esc(x.item)}</b><div><span class="badge ${cls}">${esc(x.result||'未填')}</span></div><div class="muted">標準：${esc(x.standard)}</div>${x.note?`<div>備註：${esc(x.note)}</div>`:''}${x.abnormalNote?`<div>異常說明：${esc(x.abnormalNote)}</div>`:''}${x.action?`<div>處理方式：${esc(x.action)}</div>`:''}${photos.length?`<div class="photos">${photos.map(p=>`<img src="${esc(typeof p==='string'?p:(p.url||''))}" loading="lazy">`).join('')}</div>`:''}</div>`}
function fmt(s){if(!s)return '';try{return new Date(s).toLocaleString('zh-TW',{hour12:false})}catch{return s}}
function toggleDetails(i){$('details-'+i).classList.toggle('open')}
function printOne(i){document.querySelectorAll('.card').forEach((el,idx)=>el.style.display=idx===i?'block':'none');document.querySelectorAll('.details').forEach(el=>el.classList.add('open'));window.print();document.querySelectorAll('.card').forEach(el=>el.style.display='');render()}
function printAll(){if(!filtered.length){alert('找不到紀錄');return}document.querySelectorAll('.details').forEach(el=>el.classList.add('open'));window.print()}
function exportCSV(){const rows=[['巡檢人員','送出時間','班別','天氣','巡檢點','類別','項目','結果','標準','備註','異常說明','處理方式','照片']];filtered.forEach(r=>r.items.forEach(it=>rows.push([r.inspector,fmt(r.submittedAt),r.shift,r.weather,it.location,it.category,it.item,it.result,it.standard,it.note,it.abnormalNote,it.action,(it.photos||[]).map(p=>typeof p==='string'?p:(p.url||'')).join(' | ')])));const csv='\ufeff'+rows.map(row=>row.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='巡檢紀錄.csv';a.click()}
async function deleteRecord(i){const r=filtered[i];if(!r)return;if(!confirm(`確定刪除這筆紀錄？\n${r.inspector}｜${fmt(r.submittedAt)}\n刪除後雲端紀錄會移除，無法復原。`))return;try{showMsg('刪除中...');const res=await fetch('/api/deleteRecord',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:r.id,blobUrl:r.blobUrl,blobPathname:r.blobPathname})});const txt=await res.text();if(!res.ok)throw new Error(txt);showMsg('已刪除，重新讀取中...');await loadRecords(false)}catch(e){showMsg('刪除失敗：'+(e.message||e));}}
loadRecords(false);
</script>
</body>
</html>
