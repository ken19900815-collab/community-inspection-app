<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>主管巡檢後台</title>
<style>
:root{--navy:#111827;--blue:#1d4ed8;--green:#16a34a;--red:#dc2626;--orange:#d97706;--gray:#64748b;--bg:#f1f5f9;--card:#fff;--line:#e2e8f0}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--navy);line-height:1.45}
header{background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff;padding:28px 18px}header h1{margin:0 0 8px;font-size:28px}main{max-width:1120px;margin:auto;padding:16px}
.panel,.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 20px rgba(15,23,42,.06);padding:16px;margin:14px 0}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}button{border:0;border-radius:12px;padding:12px 16px;font-weight:900;font-size:15px;cursor:pointer}
.b-blue{background:var(--blue);color:#fff}.b-green{background:var(--green);color:#fff}.b-dark{background:#1f2937;color:#fff}.b-red{background:var(--red);color:#fff}
input,select{border:1px solid #cbd5e1;border-radius:12px;padding:12px;font-size:15px;background:#fff;min-width:210px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:#f8fafc;border-radius:16px;padding:16px}.stat b{display:block;font-size:30px;margin-top:6px}
.record-title{font-size:24px;font-weight:900}.muted{color:var(--gray)}.badges{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.badge{border-radius:999px;padding:6px 12px;font-weight:800}
.ok{background:#dcfce7;color:#166534}.att{background:#fef3c7;color:#92400e}.bad{background:#fee2e2;color:#991b1b}.na{background:#e2e8f0;color:#334155}.photoBadge{background:#e0f2fe;color:#075985}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}.summary{background:#f8fafc;border-radius:16px;padding:14px;margin:10px 0}.details{display:none;margin-top:12px}.details.open{display:block}
.item{border-top:1px solid var(--line);padding:12px 0}.photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.photos img{width:96px;height:96px;object-fit:cover;border-radius:10px;border:1px solid var(--line);background:#f8fafc}
.notice{padding:12px;border-radius:14px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;margin:12px 0}.okmsg{background:#f0fdf4;border-color:#bbf7d0;color:#166534}.empty{text-align:center;color:var(--gray);font-size:20px;padding:30px}.debug{font-size:12px;background:#0f172a;color:#e5e7eb;padding:10px;border-radius:10px;white-space:pre-wrap;overflow:auto;display:none}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}input,select{width:100%}.toolbar{display:grid;grid-template-columns:1fr}.toolbar button{width:100%}.actions button{width:100%}.record-title{font-size:22px}}
</style>
</head>
<body>
<header><h1>主管巡檢後台</h1><p>雲端紀錄、異常追蹤、照片查閱、完整 PDF / CSV、雲端刪除紀錄</p></header>
<main>
<section class="panel">
<div class="toolbar">
<button class="b-blue" onclick="loadRecords(true)">重新整理</button>
<button class="b-green" onclick="exportCSV()">匯出 CSV</button>
<button class="b-dark" onclick="printAllReports()">產生完整 PDF 報告（全部）</button>
<input id="search" placeholder="搜尋巡檢人員 / 點位 / 項目 / 照片" oninput="render()">
<select id="filter" onchange="render()"><option value="all">全部狀態</option><option value="abnormal">只看異常</option><option value="attention">只看待注意</option><option value="photo">只看有照片</option></select>
</div>
<div id="msg" class="notice" style="display:none"></div><div id="debug" class="debug"></div>
</section>
<section class="panel"><div class="stats"><div class="stat">總紀錄<b id="sRecords">0</b></div><div class="stat">總項目<b id="sItems">0</b></div><div class="stat">異常<b id="sAbnormal">0</b></div><div class="stat">照片<b id="sPhotos">0</b></div></div></section>
<section id="list"></section>
</main>
<script>
let records=[], filtered=[];
const $=id=>document.getElementById(id);
function showMsg(t, ok=false){$('msg').style.display=t?'block':'none';$('msg').className='notice'+(ok?' okmsg':'');$('msg').textContent=t||''}
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function pick(o,keys,f=''){if(!o||typeof o!=='object')return f;for(const k of keys){const v=o[k];if(v!==undefined&&v!==null&&String(v).trim()!=='')return v}return f}
function toArray(v){if(!v)return[];if(Array.isArray(v))return v;if(typeof v==='string')return v.split(/\s*[|,，、]\s*/).filter(Boolean);return [v]}
function photoUrl(p){if(!p)return'';if(typeof p==='string')return p;if(typeof p==='object')return p.url||p.preview||p.src||p.href||p.blobUrl||p.publicUrl||p.downloadUrl||p.pathname||'';return''}
function extractPhotos(){const urls=[];for(const src of arguments){for(const p of toArray(src)){const u=photoUrl(p);if(u&&/^https?:\/\//.test(u)&&!urls.includes(u))urls.push(u)}}return urls}
function itemResult(it){const a=it?.answer||it?.response||it?.data||{};return String(pick(a,['result','status','value','判定結果','判定','檢查結果','狀態'],'')||pick(it,['result','status','value','判定結果','判定','檢查結果','狀態'],'')).trim()}
function normItem(it){const a=it?.answer||it?.response||it?.data||{};const photos=extractPhotos(a.photos,a.photoUrls,a.photoURLs,a.images,a['照片'],it.photos,it.photoUrls,it.photoURLs,it.images,it['照片']);return {...it,location:pick(it,['location','locationName','巡檢點','點位','區域'],''),category:pick(it,['category','類別'],''),item:pick(it,['item','itemName','點檢項目','項目','name'],''),standard:pick(it,['standard','標準','檢查標準','requirement'],''),result:itemResult(it),note:pick(a,['note','remark','remarks','備註','說明'],'')||pick(it,['note','remark','remarks','備註','說明'],''),abnormalNote:pick(a,['abnormal','abnormalNote','abnormalDescription','異常說明','異常內容'],'')||pick(it,['abnormal','abnormalNote','abnormalDescription','異常說明','異常內容'],''),action:pick(a,['action','process','handling','處理方式','改善方式','處理結果'],'')||pick(it,['action','process','handling','處理方式','改善方式','處理結果'],''),dueDate:pick(a,['dueDate','預計完成日'],'')||pick(it,['dueDate','預計完成日'],''),photos}}
function deepPick(obj,keys){try{const stack=[obj],seen=new Set();while(stack.length){const x=stack.shift();if(!x||typeof x!=='object'||seen.has(x))continue;seen.add(x);for(const k of keys){if(x[k]!==undefined&&x[k]!==null&&String(x[k]).trim()!=='')return x[k]}for(const v of Object.values(x))if(v&&typeof v==='object')stack.push(v)}}catch{}return''}
function normalize(r){const items=(Array.isArray(r.items)?r.items:Array.isArray(r.records)?r.records:Array.isArray(r.details)?r.details:[]).map(normItem);const c=rx=>items.filter(i=>rx.test(i.result)).length;const photos=items.reduce((s,it)=>s+(it.photos||[]).length,0);const inspector=pick(r,['inspector','inspectorName','staffName','userName','name','displayName','lineDisplayName','巡檢人員','填表人員','檢查人員'],'')||pick(r.meta,['inspector','inspectorName','staffName','userName','name','displayName','lineDisplayName','巡檢人員','填表人員','檢查人員'],'')||pick(r.lineProfile,['displayName','name'],'')||deepPick(r,['inspector','inspectorName','staffName','巡檢人員','填表人員','檢查人員','displayName'])||'未填人員';return {...r,items,inspector:String(inspector),shift:pick(r,['shift','班別'],'')||pick(r.meta,['shift','班別'],''),weather:pick(r,['weather','天氣'],'')||pick(r.meta,['weather','天氣'],''),submittedAt:pick(r,['submittedAt','createdAt','time','timestamp','送出時間','巡檢時間'],'')||pick(r.meta,['submittedAt','createdAt','time','timestamp','送出時間','巡檢時間'],''),totalItems:Number(r.totalItems||r.total||r['總項目']||items.length||0),normalCount:Number(r.normalCount??r.normal??r['正常']??c(/正常|OK|Normal/i)),attentionCount:Number(r.attentionCount??r.attention??r['待注意']??c(/待注意|注意|Attention/i)),abnormalCount:Number(r.abnormalCount??r.abnormal??r['異常']??c(/異常|Abnormal|NG/i)),naCount:Number(r.naCount??r.na??r['N/A']??c(/N\/A|NA|不適用/i)),photoCount:photos,id:r.id||r.recordId||r['紀錄ID']||'',blobUrl:r.blobUrl||'',blobPathname:r.blobPathname||''}}
async function loadRecords(manual=false){try{showMsg(manual?'讀取中...':'');const res=await fetch('/api/getRecords',{cache:'no-store'});const text=await res.text();if(!res.ok)throw new Error(text);let data=JSON.parse(text);if(!Array.isArray(data))data=data.records||data.data||data.items||[];records=data.map(normalize);showMsg(records.length?`已讀取 ${records.length} 筆紀錄`:'目前沒有紀錄',true);render()}catch(e){showMsg('讀取失敗：'+(e.message||e));$('debug').style.display='block';$('debug').textContent=String(e.stack||e)}}
function render(){const q=$('search').value.trim().toLowerCase(),f=$('filter').value;filtered=records.filter(r=>{const hay=JSON.stringify(r).toLowerCase();if(q&&!hay.includes(q))return false;if(f==='abnormal'&&r.abnormalCount<=0)return false;if(f==='attention'&&r.attentionCount<=0)return false;if(f==='photo'&&r.photoCount<=0)return false;return true});$('sRecords').textContent=filtered.length;$('sItems').textContent=filtered.reduce((s,r)=>s+r.totalItems,0);$('sAbnormal').textContent=filtered.reduce((s,r)=>s+r.abnormalCount,0);$('sPhotos').textContent=filtered.reduce((s,r)=>s+r.photoCount,0);$('list').innerHTML=filtered.length?filtered.map(card).join(''):'<div class="card empty">沒有符合條件的紀錄</div>'}
function card(r,i){const ab=r.items.filter(x=>/異常|待注意|注意/.test(x.result));return `<article class="card" id="rec-${i}"><div class="record-title">${esc(r.inspector)}｜${esc(fmt(r.submittedAt))}</div><div class="muted">班別：${esc(r.shift)}｜天氣：${esc(r.weather)}｜總項目：${r.totalItems}</div><div class="badges"><span class="badge ok">正常 ${r.normalCount}</span><span class="badge att">待注意 ${r.attentionCount}</span><span class="badge bad">異常 ${r.abnormalCount}</span><span class="badge na">N/A ${r.naCount}</span><span class="badge photoBadge">照片 ${r.photoCount}</span></div><div class="actions"><button class="b-green" onclick="printOneReport(${i})">本筆完整 PDF（含照片）</button><button class="b-dark" onclick="toggleDetails(${i})">畫面展開完整明細</button><button class="b-red" onclick="deleteRecord(${i})">刪除紀錄</button></div><div class="summary"><b>異常 / 待注意摘要</b><br>${ab.length?ab.map(x=>`【${esc(x.location)}】${esc(x.item)}：${esc(x.result)} ${esc(x.abnormalNote||x.note||x.action)}`).join('<br>'):'本筆無異常或待注意。'}</div><div class="details" id="details-${i}">${r.items.map(itemHtml).join('')}</div></article>`}
function itemHtml(x){const cls=statusClass(x.result);return `<div class="item"><b>${esc(x.location)}｜${esc(x.category)}｜${esc(x.item)}</b><div><span class="badge ${cls}">${esc(x.result||'未填')}</span></div><div class="muted">標準：${esc(x.standard)}</div>${x.note?`<div>備註：${esc(x.note)}</div>`:''}${x.abnormalNote?`<div>異常說明：${esc(x.abnormalNote)}</div>`:''}${x.action?`<div>處理方式：${esc(x.action)}</div>`:''}${x.dueDate?`<div>預計完成：${esc(x.dueDate)}</div>`:''}${photoHtml(x.photos)}</div>`}
function photoHtml(photos){photos=photos||[];return photos.length?`<div class="photos">${photos.map((u,idx)=>`<a href="${esc(u)}" target="_blank"><img src="${esc(u)}" loading="eager" referrerpolicy="no-referrer" alt="照片${idx+1}"></a>`).join('')}</div>`:''}
function fmt(s){if(!s)return'';try{return new Date(s).toLocaleString('zh-TW',{hour12:false})}catch{return s}}
function toggleDetails(i){$('details-'+i).classList.toggle('open')}
function statusClass(result){return /異常/.test(result)?'bad':/待注意|注意/.test(result)?'att':/N\/A|NA|不適用/.test(result)?'na':'ok'}
function buildReport(recordsToPrint,title){const now=new Date().toLocaleString('zh-TW',{hour12:false});return `<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(title)}</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',Arial,sans-serif;color:#111827;margin:0;background:#fff;line-height:1.45}.top{position:sticky;top:0;background:#0f172a;color:white;padding:10px 14px;z-index:10}.top button{background:#16a34a;color:#fff;border:0;border-radius:10px;padding:10px 14px;font-weight:900}.wrap{padding:18px}.record{page-break-after:always;border-bottom:2px solid #111827;padding-bottom:18px;margin-bottom:20px}.head{border-bottom:3px solid #111827;padding-bottom:10px;margin-bottom:12px}h1{font-size:24px;margin:0 0 8px}.meta{color:#475569}.badge{display:inline-block;border-radius:999px;padding:4px 10px;margin:4px;font-weight:800}.ok{background:#dcfce7;color:#166534}.att{background:#fef3c7;color:#92400e}.bad{background:#fee2e2;color:#991b1b}.na{background:#e2e8f0;color:#334155}.item{break-inside:avoid;border-top:1px solid #cbd5e1;padding:10px 0}.item h3{font-size:15px;margin:0 0 6px}.std{color:#475569;background:#f8fafc;padding:8px;border-radius:8px}.photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.photos img{width:150px;height:150px;object-fit:cover;border:1px solid #cbd5e1;border-radius:8px;break-inside:avoid}.sign{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:22px}.line{border-top:1px solid #111827;padding-top:8px;height:50px}@media print{.top{display:none}.wrap{padding:0}.record{page-break-after:always}.photos img{width:135px;height:135px}}</style></head><body><div class="top"><button onclick="window.print()">列印 / 另存 PDF</button> <span>若照片尚未顯示，請等 2 秒再按列印。</span></div><div class="wrap"><h1>${esc(title)}</h1><div class="meta">產生時間：${esc(now)}｜紀錄數：${recordsToPrint.length}</div>${recordsToPrint.map(reportRecord).join('')}</div><script>function waitImgs(){var imgs=[].slice.call(document.images);if(!imgs.length)return Promise.resolve();return Promise.all(imgs.map(function(img){return img.complete?Promise.resolve():new Promise(function(resolve){img.onload=resolve;img.onerror=resolve;setTimeout(resolve,4000);});}));}window.addEventListener('load',function(){waitImgs().then(function(){setTimeout(function(){try{window.print();}catch(e){}},600);});});<\/script></body></html>`}
function reportRecord(r){const abnormal=r.items.filter(x=>/異常|待注意|注意/.test(x.result));return `<section class="record"><div class="head"><h1>社區巡檢完整報告</h1><div class="meta">巡檢人員：${esc(r.inspector)}｜班別：${esc(r.shift)}｜天氣：${esc(r.weather)}｜送出時間：${esc(fmt(r.submittedAt))}</div><div><span class="badge ok">正常 ${r.normalCount}</span><span class="badge att">待注意 ${r.attentionCount}</span><span class="badge bad">異常 ${r.abnormalCount}</span><span class="badge na">N/A ${r.naCount}</span><span class="badge">照片 ${r.photoCount}</span></div></div><h2>異常 / 待注意摘要</h2>${abnormal.length?abnormal.map(x=>`<div class="item"><b>【${esc(x.location)}】${esc(x.item)}</b>：${esc(x.result)}<br>${esc(x.abnormalNote||x.note||x.action||'')}</div>`).join(''):'<p>本筆無異常或待注意。</p>'}<h2>完整巡檢明細</h2>${r.items.map(reportItem).join('')}<div class="sign"><div class="line">巡檢人員簽名：</div><div class="line">主管複核簽名：</div></div></section>`}
function reportItem(x){return `<div class="item"><h3>${esc(x.location)}｜${esc(x.category)}｜${esc(x.item)} <span class="badge ${statusClass(x.result)}">${esc(x.result||'未填')}</span></h3><div class="std">標準：${esc(x.standard)}</div>${x.note?`<div>備註：${esc(x.note)}</div>`:''}${x.abnormalNote?`<div>異常說明：${esc(x.abnormalNote)}</div>`:''}${x.action?`<div>處理方式：${esc(x.action)}</div>`:''}${x.dueDate?`<div>預計完成：${esc(x.dueDate)}</div>`:''}${photoHtml(x.photos)}</div>`}
function openReport(recs,title){if(!recs.length){alert('找不到紀錄');return}const html=buildReport(recs,title);const w=window.open('','_blank');if(w){w.document.open();w.document.write(html);w.document.close()}else{document.body.innerHTML=html}}
function printOneReport(i){const r=filtered[i];if(!r){alert('找不到紀錄');return}openReport([r],`巡檢完整報告-${r.inspector}-${fmt(r.submittedAt)}`)}
function printAllReports(){openReport(filtered,'巡檢完整報告（全部）')}
function exportCSV(){const rows=[['巡檢人員','送出時間','班別','天氣','巡檢點','類別','項目','結果','標準','備註','異常說明','處理方式','預計完成','照片']];filtered.forEach(r=>r.items.forEach(it=>rows.push([r.inspector,fmt(r.submittedAt),r.shift,r.weather,it.location,it.category,it.item,it.result,it.standard,it.note,it.abnormalNote,it.action,it.dueDate,(it.photos||[]).join(' | ')])));const csv='\ufeff'+rows.map(row=>row.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='巡檢紀錄_含照片連結.csv';a.click()}
async function deleteRecord(i){const r=filtered[i];if(!r)return;if(!confirm(`確定刪除這筆紀錄？\n${r.inspector}｜${fmt(r.submittedAt)}\n刪除後雲端紀錄會移除，無法復原。`))return;try{showMsg('刪除中...');const res=await fetch('/api/deleteRecord',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:r.id,blobUrl:r.blobUrl,blobPathname:r.blobPathname})});const txt=await res.text();if(!res.ok)throw new Error(txt);showMsg('已刪除，重新讀取中...',true);await loadRecords(false)}catch(e){showMsg('刪除失敗：'+(e.message||e))}}
loadRecords(false);
</script>
</body>
</html>
