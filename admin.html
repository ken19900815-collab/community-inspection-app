<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>主管巡檢後台</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;margin:0;background:#f5f7fb;color:#172033}
header{background:#102c58;color:#fff;padding:18px} main{padding:16px;max-width:1100px;margin:auto}
.card{background:#fff;border:1px solid #e6eaf2;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 8px 24px rgba(15,23,42,.08)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#f8fafc;border-radius:14px;padding:12px}.stat b{font-size:24px;display:block}
button{border:0;border-radius:12px;padding:11px 14px;font-weight:800;background:#2563eb;color:#fff}
table{width:100%;border-collapse:collapse;background:#fff}td,th{border-bottom:1px solid #e6eaf2;padding:9px;text-align:left;vertical-align:top;font-size:14px}
.bad{color:#dc2626;font-weight:900}.warn{color:#b45309;font-weight:900}.thumb{width:70px;height:70px;object-fit:cover;border-radius:10px;margin:3px}
@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)} table{font-size:12px}}
</style>
</head>
<body>
<header><h1>主管巡檢後台</h1><div>雲端紀錄、異常追蹤、照片查閱、CSV/PDF</div></header>
<main>
<div class="card"><button onclick="loadRecords()">重新整理</button> <button onclick="exportCSV()">匯出CSV</button> <button onclick="window.print()">列印 / 另存PDF</button></div>
<div class="card grid">
<div class="stat">總紀錄<b id="totalRecords">0</b></div>
<div class="stat">總項目<b id="totalItems">0</b></div>
<div class="stat">異常<b id="totalBad">0</b></div>
<div class="stat">待注意<b id="totalWarn">0</b></div>
</div>
<div id="records"></div>
</main>
<script>
let records=[];
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
async function loadRecords(){
 const res=await fetch("/api/getRecords");
 if(!res.ok){document.getElementById("records").innerHTML='<div class="card">讀取失敗：'+esc(await res.text())+'</div>';return;}
 records=await res.json();
 render();
}
function render(){
 let totalItems=0,bad=0,warn=0;
 records.forEach(r=>r.items?.forEach(i=>{totalItems++; if(i.answer?.result==="異常")bad++; if(i.answer?.result==="待注意")warn++;}));
 document.getElementById("totalRecords").textContent=records.length;
 document.getElementById("totalItems").textContent=totalItems;
 document.getElementById("totalBad").textContent=bad;
 document.getElementById("totalWarn").textContent=warn;
 document.getElementById("records").innerHTML=records.map(r=>{
   const issues=(r.items||[]).filter(i=>["異常","待注意"].includes(i.answer?.result));
   return `<div class="card"><h2>${esc(r.meta?.inspector||"未填姓名")}｜${new Date(r.submittedAt).toLocaleString()}</h2>
   <div>班別：${esc(r.meta?.shift)}｜天氣：${esc(r.meta?.weather)}｜異常/待注意：${issues.length}</div>
   <table><thead><tr><th>巡檢點</th><th>項目</th><th>結果</th><th>說明/處理</th><th>照片</th></tr></thead><tbody>
   ${issues.map(i=>`<tr><td>${esc(i.location)}</td><td>${esc(i.category)}<br><b>${esc(i.item)}</b></td><td class="${i.answer.result==="異常"?"bad":"warn"}">${esc(i.answer.result)}</td><td>${esc(i.answer.abnormal||i.answer.note)}<br>${esc(i.answer.action||"")}</td><td>${(i.answer.photos||[]).map(p=>`<a href="${p.url||p.preview}" target="_blank"><img class="thumb" src="${p.url||p.preview}"></a>`).join("")}</td></tr>`).join("")}
   </tbody></table></div>`;
 }).join("") || '<div class="card">目前沒有紀錄。</div>';
}
function exportCSV(){
 const rows=[["送出時間","巡檢人員","班別","天氣","巡檢點","類別","項目","結果","備註","異常說明","處理方式","照片"]];
 records.forEach(r=>(r.items||[]).forEach(i=>rows.push([r.submittedAt,r.meta?.inspector,r.meta?.shift,r.meta?.weather,i.location,i.category,i.item,i.answer?.result,i.answer?.note,i.answer?.abnormal,i.answer?.action,(i.answer?.photos||[]).map(p=>p.url).join(" ")])));
 const csv=rows.map(row=>row.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");
 const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
 const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="inspection_records.csv";a.click();
}
loadRecords();
</script>
</body>
</html>
