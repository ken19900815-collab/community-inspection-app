<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>主管巡檢後台</title>
  <style>
    :root{--navy:#0f2747;--blue:#1d4ed8;--green:#16a34a;--orange:#f59e0b;--red:#dc2626;--gray:#64748b;--bg:#f5f7fb;--card:#ffffff;--line:#e5e7eb;}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:var(--bg);color:#172033;}
    header{background:linear-gradient(135deg,#0f2747,#214f86);color:#fff;padding:28px 24px;} header h1{margin:0;font-size:30px} header p{margin:10px 0 0;opacity:.9}
    main{max-width:1180px;margin:0 auto;padding:20px;}.toolbar,.stats,.panel{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 6px 18px rgba(15,39,71,.08)}
    button{border:0;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer;background:var(--blue);color:white;margin:4px;} button.secondary{background:#334155} button.green{background:var(--green)} button.red{background:var(--red)} button.light{background:#eef2ff;color:#1e3a8a}.danger{color:var(--red)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{padding:10px 12px;border-radius:14px;background:#f8fafc}.stat .label{color:#64748b;font-size:14px}.stat .num{font-size:30px;font-weight:800;margin-top:4px}.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center} input,select{padding:11px;border:1px solid #d6dde8;border-radius:10px;background:#fff;min-width:170px}.record{border:1px solid var(--line);border-radius:16px;background:#fff;margin:14px 0;overflow:hidden}.record-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;padding:16px;border-bottom:1px solid var(--line);background:#fbfdff}.record-title{font-size:18px;font-weight:800}.meta{color:#64748b;font-size:14px;line-height:1.8}.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.badge{border-radius:999px;padding:5px 10px;font-size:13px;font-weight:700}.normal{background:#dcfce7;color:#166534}.attention{background:#fef3c7;color:#92400e}.abnormal{background:#fee2e2;color:#991b1b}.na{background:#e2e8f0;color:#334155}.record-actions{white-space:nowrap}.items{padding:12px 16px}.item{border-top:1px solid #eef2f7;padding:12px 0;display:grid;grid-template-columns:120px 1fr 110px;gap:12px;align-items:start}.item:first-child{border-top:0}.cat{font-size:13px;color:#64748b}.item-name{font-weight:800}.std{font-size:14px;color:#475569;margin-top:4px}.note{font-size:14px;margin-top:6px;background:#f8fafc;border-radius:10px;padding:8px}.photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.photos img{width:88px;height:88px;object-fit:cover;border-radius:10px;border:1px solid #e5e7eb}.empty{text-align:center;color:#64748b;padding:30px}.err{background:#fff7ed;color:#9a3412;padding:12px;border-radius:12px;border:1px solid #fed7aa}.small{font-size:13px;color:#64748b}.hidden{display:none!important}
    @media(max-width:800px){.stats{grid-template-columns:repeat(2,1fr)}.record-head{display:block}.record-actions{margin-top:10px;white-space:normal}.item{grid-template-columns:1fr}.filters input,.filters select{width:100%}}
    @media print{body{background:#fff}.toolbar,.stats,.no-print,button{display:none!important}.panel,.record{box-shadow:none;border:0}.record{page-break-inside:avoid}.photos img{width:120px;height:120px}}
  </style>
</head>
<body>
  <header>
    <h1>主管巡檢後台</h1>
    <p>雲端紀錄、異常追蹤、照片查閱、CSV / PDF 報告</p>
  </header>
  <main>
    <section class="toolbar no-print">
      <div class="filters">
        <button onclick="loadRecords()">重新整理</button>
        <button class="green" onclick="exportCSV()">匯出 CSV</button>
        <button class="secondary" onclick="printAllReports()">產生完整 PDF 報告（全部）</button>
        <input id="keyword" placeholder="搜尋巡檢人員 / 點位 / 項目" oninput="render()" />
        <select id="statusFilter" onchange="render()">
          <option value="">全部狀態</option>
          <option value="異常">只看異常</option>
          <option value="待注意">只看待注意</option>
          <option value="正常">只看正常</option>
        </select>
      </div>
      <p class="small">單次巡檢請按每筆右側的「本筆完整 PDF」。此功能會直接產生該筆資料的列印頁，不會跳到不存在的網址。</p>
    </section>

    <section class="stats">
      <div class="stat"><div class="label">總紀錄</div><div id="sRecords" class="num">0</div></div>
      <div class="stat"><div class="label">總項目</div><div id="sItems" class="num">0</div></div>
      <div class="stat"><div class="label">異常</div><div id="sAbnormal" class="num">0</div></div>
      <div class="stat"><div class="label">待注意</div><div id="sAttention" class="num">0</div></div>
    </section>

    <section class="panel">
      <div id="message" class="small">讀取中...</div>
      <div id="records"></div>
    </section>
  </main>

<script>
let allRecords = [];

const API = '/api/getRecords';

function safe(v){ return v === undefined || v === null ? '' : String(v); }
function esc(v){ return safe(v).replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); }
function fmtTime(v){ if(!v) return ''; const d = new Date(v); return isNaN(d) ? safe(v) : d.toLocaleString('zh-TW'); }
function getItems(r){ return Array.isArray(r.items) ? r.items : []; }
function getStatus(i){ return i.status || i.result || i.judgement || i.value || ''; }
function getLocation(i){ return i.locationName || i.location || i.place || ''; }
function getCategory(i){ return i.category || i.cat || ''; }
function getItemName(i){ return i.itemName || i.item || i.name || i.title || ''; }
function getStandard(i){ return i.standard || i.requirement || i.desc || ''; }
function getNotes(i){ return i.note || i.notes || i.remark || i.memo || ''; }
function getReason(i){ return i.abnormalReason || i.abnormalNote || i.reason || i.issue || ''; }
function getAction(i){ return i.action || i处理方式 || i.process || i.solution || i.correctiveAction || ''; }
function getPhotos(i){ return Array.isArray(i.photos) ? i.photos : (Array.isArray(i.photoUrls) ? i.photoUrls : (i.photoUrl ? [i.photoUrl] : [])); }
function statusClass(s){ if(s === '異常') return 'abnormal'; if(s === '待注意') return 'attention'; if(s === '正常') return 'normal'; return 'na'; }
function recordTitle(r, idx){ return `${fmtTime(r.submittedAt || r.createdAt) || '未記錄時間'}｜${r.lineDisplayName || r.inspector || '未填巡檢人員'}｜第 ${idx+1} 筆`; }

async function loadRecords(){
  const msg = document.getElementById('message');
  msg.textContent = '讀取中...';
  try{
    const res = await fetch(API, {cache:'no-store'});
    if(!res.ok){ throw new Error(await res.text()); }
    const data = await res.json();
    allRecords = Array.isArray(data) ? data : [];
    msg.textContent = allRecords.length ? `已讀取 ${allRecords.length} 筆紀錄` : '目前沒有雲端紀錄';
    render();
  }catch(e){
    msg.innerHTML = `<div class="err">讀取失敗：${esc(e.message || e)}</div>`;
    allRecords = [];
    render();
  }
}

function filteredRecords(){
  const kw = document.getElementById('keyword').value.trim().toLowerCase();
  const sf = document.getElementById('statusFilter').value;
  return allRecords.filter(r=>{
    const items = getItems(r);
    const hitStatus = !sf || items.some(i=>getStatus(i)===sf);
    const blob = JSON.stringify(r).toLowerCase();
    const hitKw = !kw || blob.includes(kw);
    return hitStatus && hitKw;
  });
}

function render(){
  const list = filteredRecords();
  let total=0, ab=0, att=0;
  allRecords.forEach(r=>getItems(r).forEach(i=>{total++; if(getStatus(i)==='異常')ab++; if(getStatus(i)==='待注意')att++;}));
  document.getElementById('sRecords').textContent = allRecords.length;
  document.getElementById('sItems').textContent = total;
  document.getElementById('sAbnormal').textContent = ab;
  document.getElementById('sAttention').textContent = att;

  const box = document.getElementById('records');
  if(!list.length){ box.innerHTML = '<div class="empty">沒有符合條件的紀錄</div>'; return; }
  box.innerHTML = list.map((r,idx)=>recordHTML(r, idx)).join('');
}

function recordHTML(r, idx){
  const items = getItems(r);
  const normal = items.filter(i=>getStatus(i)==='正常').length;
  const att = items.filter(i=>getStatus(i)==='待注意').length;
  const ab = items.filter(i=>getStatus(i)==='異常').length;
  const na = items.filter(i=>getStatus(i)==='N/A').length;
  const originalIndex = allRecords.indexOf(r);
  return `
    <div class="record">
      <div class="record-head">
        <div>
          <div class="record-title">${esc(recordTitle(r, idx))}</div>
          <div class="meta">
            巡檢人員：${esc(r.lineDisplayName || r.inspector || '')}　班別：${esc(r.shift || '')}　天氣：${esc(r.weather || '')}<br>
            社區：${esc(r.communityName || '')}　送出時間：${esc(fmtTime(r.submittedAt || r.createdAt))}
          </div>
          <div class="badges">
            <span class="badge normal">正常 ${normal}</span>
            <span class="badge attention">待注意 ${att}</span>
            <span class="badge abnormal">異常 ${ab}</span>
            <span class="badge na">N/A ${na}</span>
          </div>
        </div>
        <div class="record-actions no-print">
          <button onclick="printSingleReport(${originalIndex})">本筆完整 PDF</button>
          <button class="light" onclick="toggleItems(this)">展開 / 收合</button>
        </div>
      </div>
      <div class="items hidden">
        ${items.map(itemHTML).join('')}
      </div>
    </div>`;
}

function itemHTML(i){
  const st = getStatus(i) || '未填';
  const photos = getPhotos(i);
  return `
    <div class="item">
      <div><span class="badge ${statusClass(st)}">${esc(st)}</span><div class="cat">${esc(getCategory(i))}</div></div>
      <div>
        <div class="item-name">${esc(getLocation(i))}｜${esc(getItemName(i))}</div>
        <div class="std">${esc(getStandard(i))}</div>
        ${getNotes(i) ? `<div class="note">備註：${esc(getNotes(i))}</div>` : ''}
        ${getReason(i) ? `<div class="note danger">異常說明：${esc(getReason(i))}</div>` : ''}
        ${getAction(i) ? `<div class="note">處理方式：${esc(getAction(i))}</div>` : ''}
        ${photos.length ? `<div class="photos">${photos.map(p=>`<img src="${esc(typeof p==='string'?p:p.url)}" />`).join('')}</div>` : ''}
      </div>
      <div class="small">${esc(i.completedAt ? fmtTime(i.completedAt) : '')}</div>
    </div>`;
}

function toggleItems(btn){
  const items = btn.closest('.record').querySelector('.items');
  items.classList.toggle('hidden');
}

function buildReportHTML(records, title){
  const now = new Date().toLocaleString('zh-TW');
  return `<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(title)}</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;color:#111827;margin:24px;}
    h1{font-size:26px;margin:0 0 8px}.sub{color:#64748b;margin-bottom:18px}.record{page-break-after:always;border-top:4px solid #0f2747;padding-top:16px;margin-top:20px}.record:last-child{page-break-after:auto}.meta{line-height:1.8;background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin:12px 0}.item{border-top:1px solid #e5e7eb;padding:12px 0;page-break-inside:avoid}.row{display:flex;justify-content:space-between;gap:12px}.name{font-weight:800;font-size:16px}.std{color:#475569;margin-top:4px}.badge{display:inline-block;border-radius:999px;padding:4px 9px;font-size:13px;font-weight:800}.normal{background:#dcfce7;color:#166534}.attention{background:#fef3c7;color:#92400e}.abnormal{background:#fee2e2;color:#991b1b}.na{background:#e2e8f0;color:#334155}.note{background:#f8fafc;border-radius:8px;padding:8px;margin-top:6px}.danger{color:#991b1b}.photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.photos img{width:130px;height:130px;object-fit:cover;border:1px solid #ddd;border-radius:8px}.sign{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:25px}.box{border:1px solid #cbd5e1;height:80px;border-radius:8px;padding:8px;color:#64748b}@media print{button{display:none}.record{break-inside:auto}.item{break-inside:avoid} body{margin:14mm}}
  </style></head><body>
  <button onclick="window.print()" style="position:fixed;right:18px;top:18px;padding:12px 16px;background:#1d4ed8;color:white;border:0;border-radius:10px;font-weight:800;">列印 / 另存 PDF</button>
  <h1>${esc(title)}</h1><div class="sub">產生時間：${esc(now)}</div>
  ${records.map((r,idx)=>singleRecordReportHTML(r, idx)).join('')}
  </body></html>`;
}

function singleRecordReportHTML(r, idx){
  const items = getItems(r);
  const normal = items.filter(i=>getStatus(i)==='正常').length;
  const att = items.filter(i=>getStatus(i)==='待注意').length;
  const ab = items.filter(i=>getStatus(i)==='異常').length;
  const na = items.filter(i=>getStatus(i)==='N/A').length;
  return `<section class="record">
    <h2>第 ${idx+1} 筆巡檢紀錄</h2>
    <div class="meta">
      巡檢人員：${esc(r.lineDisplayName || r.inspector || '')}<br>
      班別：${esc(r.shift || '')}　天氣：${esc(r.weather || '')}<br>
      社區：${esc(r.communityName || '')}<br>
      送出時間：${esc(fmtTime(r.submittedAt || r.createdAt))}<br>
      統計：正常 ${normal}、待注意 ${att}、異常 ${ab}、N/A ${na}、總項目 ${items.length}
    </div>
    ${items.map(i=>`<div class="item"><div class="row"><div><div class="name">${esc(getLocation(i))}｜${esc(getCategory(i))}｜${esc(getItemName(i))}</div><div class="std">標準：${esc(getStandard(i))}</div></div><div><span class="badge ${statusClass(getStatus(i))}">${esc(getStatus(i)||'未填')}</span></div></div>${getNotes(i)?`<div class="note">備註：${esc(getNotes(i))}</div>`:''}${getReason(i)?`<div class="note danger">異常說明：${esc(getReason(i))}</div>`:''}${getAction(i)?`<div class="note">處理方式：${esc(getAction(i))}</div>`:''}${getPhotos(i).length?`<div class="photos">${getPhotos(i).map(p=>`<img src="${esc(typeof p==='string'?p:p.url)}">`).join('')}</div>`:''}</div>`).join('')}
    <div class="sign"><div class="box">巡檢人員簽名：</div><div class="box">主管複核簽名：</div></div>
  </section>`;
}

function openPrintWindow(html){
  const w = window.open('', '_blank');
  if(!w){
    alert('瀏覽器擋住新視窗，請允許彈出視窗後再按一次。');
    return;
  }
  w.document.open();
  w.document.write(html);
  w.document.close();
  setTimeout(()=>{ try{ w.focus(); }catch(e){} }, 300);
}

function printSingleReport(index){
  const r = allRecords[index];
  if(!r){ alert('找不到這筆紀錄，請先重新整理。'); return; }
  openPrintWindow(buildReportHTML([r], '單次巡檢完整報告'));
}

function printAllReports(){
  const list = filteredRecords();
  if(!list.length){ alert('沒有可列印的紀錄'); return; }
  openPrintWindow(buildReportHTML(list, '完整巡檢報告（全部紀錄）'));
}

function exportCSV(){
  const rows = [['紀錄ID','送出時間','巡檢人員','班別','天氣','巡檢點','類別','點檢項目','標準','判定','備註','異常說明','處理方式','照片']];
  filteredRecords().forEach(r=>{
    getItems(r).forEach(i=> rows.push([
      r.id || '', fmtTime(r.submittedAt || r.createdAt), r.lineDisplayName || r.inspector || '', r.shift || '', r.weather || '', getLocation(i), getCategory(i), getItemName(i), getStandard(i), getStatus(i), getNotes(i), getReason(i), getAction(i), getPhotos(i).map(p=>typeof p==='string'?p:p.url).join(' | ')
    ]));
  });
  const csv = rows.map(r=>r.map(v=>`"${safe(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `巡檢紀錄_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

loadRecords();
</script>
</body>
</html>
