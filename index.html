<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>社區走動式巡檢系統</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root {
  --blue:#12365d; --blue2:#1f5f99; --bg:#f4f7fb; --card:#fff; --line:#dfe7f1;
  --green:#168a4a; --orange:#d98200; --red:#d93025; --gray:#6b7280;
}
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif; background:var(--bg); color:#172033; padding-bottom:95px; }
header { position:sticky; top:0; z-index:20; background:linear-gradient(135deg,var(--blue),var(--blue2)); color:white; padding:16px 16px 14px; box-shadow:0 4px 16px rgba(0,0,0,.18); }
h1 { font-size:20px; margin:0 0 6px; }
.sub { font-size:13px; opacity:.9; }
.wrap { padding:14px; max-width:900px; margin:0 auto; }
.grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
.stat { background:var(--card); border-radius:16px; padding:14px; box-shadow:0 2px 10px rgba(16,35,60,.08); border:1px solid var(--line); }
.stat b { display:block; font-size:24px; margin-top:4px; }
.card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:14px; margin:10px 0; box-shadow:0 2px 12px rgba(16,35,60,.08); }
.loc-card { display:flex; justify-content:space-between; align-items:center; gap:10px; cursor:pointer; }
.loc-title { font-weight:800; font-size:17px; }
.badge { border-radius:999px; padding:5px 9px; font-size:12px; font-weight:700; background:#edf2f7; color:#334155; white-space:nowrap; }
.badge.red { background:#fde8e7; color:var(--red); }
.badge.orange { background:#fff4df; color:var(--orange); }
.badge.green { background:#e5f6ec; color:var(--green); }
button { border:0; border-radius:14px; padding:12px 14px; font-size:16px; font-weight:800; cursor:pointer; }
.primary { background:var(--blue2); color:white; width:100%; }
.secondary { background:#e8eef6; color:#1b3553; }
.danger { background:var(--red); color:white; }
.tabs { display:flex; gap:8px; margin:12px 0; overflow-x:auto; padding-bottom:2px; }
.tab { flex:1; min-width:92px; background:white; border:1px solid var(--line); color:#334155; }
.tab.active { background:var(--blue2); color:white; }
.item-card { border-left:6px solid #cbd5e1; }
.item-card.ok { border-left-color:var(--green); background:#fbfffc; }
.item-card.warn { border-left-color:var(--orange); background:#fffdf7; }
.item-card.bad { border-left-color:var(--red); background:#fffafa; }
.item-head { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.item-title { font-weight:800; font-size:16px; }
.item-meta { color:var(--gray); font-size:13px; margin-top:5px; line-height:1.45; }
.standard { margin-top:8px; font-size:14px; line-height:1.55; background:#f8fafc; padding:10px; border-radius:12px; color:#334155; }
.result-buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-top:12px; }
.result-buttons button { padding:10px 4px; font-size:14px; background:#eef2f7; color:#334155; }
.result-buttons button.selected.ok { background:var(--green); color:white; }
.result-buttons button.selected.warn { background:var(--orange); color:white; }
.result-buttons button.selected.bad { background:var(--red); color:white; }
.result-buttons button.selected.na { background:#64748b; color:white; }
textarea,input,select { width:100%; border:1px solid #cbd5e1; border-radius:12px; padding:11px; font-size:16px; background:white; }
label { display:block; margin:12px 0 6px; font-weight:800; color:#334155; }
.detail { display:none; margin-top:10px; }
.detail.show { display:block; }
.photo-preview { margin-top:8px; max-width:100%; border-radius:12px; border:1px solid var(--line); display:none; }
.bottom-bar { position:fixed; left:0; right:0; bottom:0; z-index:50; padding:10px 14px calc(10px + env(safe-area-inset-bottom)); background:rgba(244,247,251,.94); backdrop-filter: blur(8px); border-top:1px solid var(--line); }
.bottom-inner { display:flex; gap:8px; max-width:900px; margin:auto; }
.bottom-inner button { flex:1; }
.hidden { display:none !important; }
.toast { position:fixed; left:16px; right:16px; bottom:92px; background:#111827; color:white; border-radius:14px; padding:12px 14px; z-index:80; display:none; text-align:center; font-weight:700; }
.empty { text-align:center; color:#64748b; padding:28px 12px; }
.small { font-size:13px; color:#64748b; line-height:1.5; }
.section-title { margin:18px 0 8px; font-size:18px; font-weight:900; }
.search-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
@media (min-width:700px) { .grid{grid-template-columns:repeat(4,1fr)} .locations{display:grid;grid-template-columns:repeat(2,1fr);gap:10px} .card{margin:0} }
@media print { header,.tabs,.bottom-bar,button,input[type=file]{display:none!important} body{background:white;padding:0} .card{box-shadow:none;break-inside:avoid} }
</style>
</head>
<body>
<header>
  <h1>社區走動式巡檢系統</h1>
  <div class="sub" id="userLine">手機巡檢｜異常拍照｜主管追蹤｜本機紀錄</div>
</header>

<div class="wrap">
  <div class="grid">
    <div class="stat">巡檢點<b id="statLoc">0</b></div>
    <div class="stat">完成項目<b id="statDone">0</b></div>
    <div class="stat">異常/待注意<b id="statAbn">0</b></div>
    <div class="stat">歷史紀錄<b id="statRecords">0</b></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showPage('home')">巡檢</button>
    <button class="tab" onclick="showPage('abnormal')">異常追蹤</button>
    <button class="tab" onclick="showPage('records')">紀錄</button>
    <button class="tab" onclick="showPage('settings')">設定</button>
  </div>

  <section id="page-home">
    <div class="card">
      <label>巡檢人員</label>
      <input id="inspector" placeholder="請輸入姓名" oninput="saveMeta()" />
      <div class="search-row">
        <div>
          <label>班別</label>
          <select id="shift" onchange="saveMeta()">
            <option>早班</option><option>中班</option><option>晚班</option><option>主管複核</option>
          </select>
        </div>
        <div>
          <label>天氣</label>
          <select id="weather" onchange="saveMeta()">
            <option>晴</option><option>陰</option><option>雨</option><option>颱風/強風</option><option>其他</option>
          </select>
        </div>
      </div>
    </div>
    <div class="section-title">選擇巡檢點</div>
    <div id="locationList" class="locations"></div>
  </section>

  <section id="page-inspection" class="hidden">
    <div class="card">
      <button class="secondary" onclick="backHome()">← 回巡檢點</button>
      <h2 id="currentLocationTitle" style="margin:12px 0 4px;"></h2>
      <div class="small">請逐項選擇判定；選「異常」或「待注意」時，系統會展開說明、處理方式與拍照欄位。</div>
    </div>
    <div id="inspectionItems"></div>
  </section>

  <section id="page-abnormal" class="hidden">
    <div class="section-title">異常追蹤</div>
    <div class="card small">此頁會列出目前尚未送出的異常/待注意，以及已送出紀錄內的異常項目。</div>
    <div id="abnormalList"></div>
  </section>

  <section id="page-records" class="hidden">
    <div class="section-title">巡檢紀錄</div>
    <div class="card">
      <button class="primary" onclick="exportCSV()">匯出 CSV</button>
      <button class="secondary" onclick="window.print()" style="width:100%;margin-top:8px;">列印 / 轉 PDF</button>
    </div>
    <div id="recordList"></div>
  </section>

  <section id="page-settings" class="hidden">
    <div class="section-title">設定 / 資料管理</div>
    <div class="card">
      <button class="danger" onclick="clearDraft()" style="width:100%;">清除目前未送出的巡檢草稿</button>
      <button class="danger" onclick="clearAllRecords()" style="width:100%;margin-top:8px;">清除全部歷史紀錄</button>
      <p class="small">照片會以瀏覽器本機暫存方式保存。若照片太多，手機瀏覽器可能容量不足；正式商用建議接雲端資料庫或 LINE 後端。</p>
    </div>
  </section>
</div>

<div class="bottom-bar hidden" id="bottomBar">
  <div class="bottom-inner">
    <button class="secondary" onclick="saveDraft()">暫存</button>
    <button class="danger" onclick="submitInspection()">送出巡檢</button>
  </div>
</div>
<div id="toast" class="toast"></div>

const LOCATIONS = [...new Set(ITEMS.map(x => x.location))];
let currentLocation = "";
let draft = JSON.parse(localStorage.getItem("inspectionDraft_v3") || "{}");
let records = JSON.parse(localStorage.getItem("inspectionRecords_v3") || "[]");
let meta = JSON.parse(localStorage.getItem("inspectionMeta_v3") || "{}");

function $(id) { return document.getElementById(id); }
function todayStr() { return new Date().toLocaleString("zh-TW", {hour12:false}); }
function keyOf(seq) { return "i_" + seq; }

async function initLiffSafe() {
  try {
    // 若之後有 LIFF ID，可在這裡填入：await liff.init({ liffId: "你的LIFF ID" });
    if (window.liff && false) {}
  } catch(e) {}
}

function init() {
  $("inspector").value = meta.inspector || "";
  $("shift").value = meta.shift || "早班";
  $("weather").value = meta.weather || "晴";
  renderLocations();
  updateStats();
  initLiffSafe();
}

function saveMeta() {
  meta = {
    inspector: $("inspector").value.trim(),
    shift: $("shift").value,
    weather: $("weather").value
  };
  localStorage.setItem("inspectionMeta_v3", JSON.stringify(meta));
}

function showToast(msg) {
  const t=$("toast"); t.textContent=msg; t.style.display="block";
  setTimeout(()=>t.style.display="none",1800);
}

function showPage(page) {
  ["home","inspection","abnormal","records","settings"].forEach(p => $("page-"+p).classList.add("hidden"));
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  if(page==="home") document.querySelectorAll(".tab")[0].classList.add("active");
  if(page==="abnormal") document.querySelectorAll(".tab")[1].classList.add("active");
  if(page==="records") document.querySelectorAll(".tab")[2].classList.add("active");
  if(page==="settings") document.querySelectorAll(".tab")[3].classList.add("active");
  $("page-"+page).classList.remove("hidden");
  $("bottomBar").classList.toggle("hidden", page !== "inspection");
  if(page==="abnormal") renderAbnormal();
  if(page==="records") renderRecords();
  updateStats();
}

function renderLocations() {
  const box = $("locationList");
  box.innerHTML = "";
  LOCATIONS.forEach((loc, idx) => {
    const locItems = ITEMS.filter(x=>x.location===loc);
    const done = locItems.filter(x => draft[keyOf(x.seq)] && draft[keyOf(x.seq)].result).length;
    const abn = locItems.filter(x => ["異常","待注意"].includes(draft[keyOf(x.seq)]?.result)).length;
    const div=document.createElement("div");
    div.className="card loc-card";
    div.onclick=()=>openLocation(loc);
    div.innerHTML = `
      <div>
        <div class="loc-title">${idx+1}. ${loc}</div>
        <div class="small">${done} / ${locItems.length} 項完成</div>
      </div>
      <div>
        <span class="badge ${abn ? 'red' : (done===locItems.length ? 'green':'')}">${abn ? abn+'異常' : (done===locItems.length ? '完成':'未完成')}</span>
      </div>`;
    box.appendChild(div);
  });
}

function openLocation(loc) {
  currentLocation = loc;
  $("currentLocationTitle").textContent = loc;
  renderInspectionItems();
  showPage("inspection");
}

function backHome() {
  currentLocation = "";
  renderLocations();
  showPage("home");
}

function renderInspectionItems() {
  const box=$("inspectionItems");
  const arr=ITEMS.filter(x=>x.location===currentLocation);
  box.innerHTML="";
  arr.forEach(x => {
    const k=keyOf(x.seq);
    if(!draft[k]) draft[k]={};
    const d=draft[k];
    const cls = d.result==="正常" ? "ok" : d.result==="待注意" ? "warn" : d.result==="異常" ? "bad" : "";
    const detailShow = ["異常","待注意"].includes(d.result) ? "show" : "";
    const div=document.createElement("div");
    div.className=`card item-card ${cls}`;
    div.id=`card_${x.seq}`;
    div.innerHTML=`
      <div class="item-head">
        <div>
          <div class="item-title">${x.seq}. ${x.item}</div>
          <div class="item-meta">${x.category}</div>
        </div>
        <span class="badge">${d.result || '未判定'}</span>
      </div>
      <div class="standard"><b>檢查標準：</b>${escapeHtml(x.standard)}</div>
      <div class="result-buttons">
        <button class="${d.result==='正常'?'selected ok':''}" onclick="setResult(${x.seq},'正常')">正常</button>
        <button class="${d.result==='待注意'?'selected warn':''}" onclick="setResult(${x.seq},'待注意')">待注意</button>
        <button class="${d.result==='異常'?'selected bad':''}" onclick="setResult(${x.seq},'異常')">異常</button>
        <button class="${d.result==='不適用'?'selected na':''}" onclick="setResult(${x.seq},'不適用')">N/A</button>
      </div>
      <div class="detail ${detailShow}" id="detail_${x.seq}">
        <label>異常 / 待注意說明</label>
        <textarea id="note_${x.seq}" placeholder="請輸入現況、位置、影響範圍" oninput="updateField(${x.seq},'note',this.value)">${escapeHtml(d.note||'')}</textarea>
        <label>處理方式</label>
        <textarea id="action_${x.seq}" placeholder="例如：已通知廠商、現場已排除、列入追蹤" oninput="updateField(${x.seq},'action',this.value)">${escapeHtml(d.action||'')}</textarea>
        <label>預計完成日</label>
        <input type="date" value="${d.due||''}" onchange="updateField(${x.seq},'due',this.value)" />
        <label>拍照上傳</label>
        <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(event,${x.seq})" />
        <img id="photo_${x.seq}" class="photo-preview" src="${d.photo||''}" style="${d.photo?'display:block':''}" />
      </div>`;
    box.appendChild(div);
  });
}

function escapeHtml(str) {
  return String(str||"").replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function setResult(seq, result) {
  const k=keyOf(seq);
  if(!draft[k]) draft[k]={};
  draft[k].result=result;
  draft[k].updatedAt=todayStr();
  saveDraft(false);
  renderInspectionItems();
  updateStats();
}

function updateField(seq, field, value) {
  const k=keyOf(seq);
  if(!draft[k]) draft[k]={};
  draft[k][field]=value;
  draft[k].updatedAt=todayStr();
  localStorage.setItem("inspectionDraft_v3", JSON.stringify(draft));
  updateStats();
}

function handlePhoto(event, seq) {
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const k=keyOf(seq);
    if(!draft[k]) draft[k]={};
    draft[k].photo = e.target.result;
    draft[k].photoName = file.name || "photo.jpg";
    localStorage.setItem("inspectionDraft_v3", JSON.stringify(draft));
    const img=$("photo_"+seq);
    if(img) { img.src=e.target.result; img.style.display="block"; }
    showToast("照片已加入");
  };
  reader.readAsDataURL(file);
}

function saveDraft(toast=true) {
  localStorage.setItem("inspectionDraft_v3", JSON.stringify(draft));
  renderLocations();
  updateStats();
  if(toast) showToast("已暫存");
}

function submitInspection() {
  saveMeta();
  if(!currentLocation) { showToast("請先選擇巡檢點"); return; }
  const arr=ITEMS.filter(x=>x.location===currentLocation);
  const missing=arr.filter(x=>!draft[keyOf(x.seq)]?.result);
  if(missing.length) {
    if(!confirm(`尚有 ${missing.length} 個項目未判定，仍要送出嗎？`)) return;
  }
  const needDetail=arr.filter(x=>["異常","待注意"].includes(draft[keyOf(x.seq)]?.result) && !(draft[keyOf(x.seq)]?.note||"").trim());
  if(needDetail.length) {
    showToast("異常/待注意需填說明");
    const first=needDetail[0].seq;
    const el=$("note_"+first); if(el) el.focus();
    return;
  }
  const rec = {
    id: "REC" + Date.now(),
    time: todayStr(),
    location: currentLocation,
    inspector: meta.inspector || "",
    shift: meta.shift || "",
    weather: meta.weather || "",
    items: arr.map(x => {
      const d=draft[keyOf(x.seq)] || {};
      return {...x, ...d};
    })
  };
  records.unshift(rec);
  localStorage.setItem("inspectionRecords_v3", JSON.stringify(records));
  // 清除該巡檢點草稿
  arr.forEach(x => delete draft[keyOf(x.seq)]);
  localStorage.setItem("inspectionDraft_v3", JSON.stringify(draft));
  showToast("✅ 已送出巡檢");
  renderInspectionItems();
  renderLocations();
  updateStats();
}

function updateStats() {
  const done = ITEMS.filter(x=>draft[keyOf(x.seq)]?.result).length;
  const abnDraft = ITEMS.filter(x=>["異常","待注意"].includes(draft[keyOf(x.seq)]?.result)).length;
  const abnRec = records.reduce((sum,r)=>sum+r.items.filter(i=>["異常","待注意"].includes(i.result)).length,0);
  $("statLoc").textContent=LOCATIONS.length;
  $("statDone").textContent=done;
  $("statAbn").textContent=abnDraft + abnRec;
  $("statRecords").textContent=records.length;
}

function renderAbnormal() {
  const box=$("abnormalList");
  let rows=[];
  ITEMS.forEach(x=>{
    const d=draft[keyOf(x.seq)];
    if(d && ["異常","待注意"].includes(d.result)) rows.push({source:"草稿", time:d.updatedAt||"", ...x, ...d});
  });
  records.forEach(r=>r.items.forEach(i=>{
    if(["異常","待注意"].includes(i.result)) rows.push({source:"已送出", time:r.time, inspector:r.inspector, shift:r.shift, weather:r.weather, ...i});
  }));
  if(!rows.length) { box.innerHTML='<div class="empty">目前沒有異常或待注意項目</div>'; return; }
  box.innerHTML = rows.map(r=>`
    <div class="card item-card ${r.result==='異常'?'bad':'warn'}">
      <div class="item-head">
        <div>
          <div class="item-title">${r.location}｜${r.item}</div>
          <div class="item-meta">${r.category}｜${r.source}｜${r.time||''}</div>
        </div>
        <span class="badge ${r.result==='異常'?'red':'orange'}">${r.result}</span>
      </div>
      <div class="standard"><b>說明：</b>${escapeHtml(r.note||'未填')}<br><b>處理：</b>${escapeHtml(r.action||'未填')}<br><b>預計完成：</b>${escapeHtml(r.due||'未填')}</div>
      ${r.photo ? `<img class="photo-preview" src="${r.photo}" style="display:block">` : ''}
    </div>`).join('');
}

function renderRecords() {
  const box=$("recordList");
  if(!records.length) { box.innerHTML='<div class="empty">尚無送出紀錄</div>'; return; }
  box.innerHTML = records.map(r=>{
    const abn=r.items.filter(i=>["異常","待注意"].includes(i.result)).length;
    const done=r.items.filter(i=>i.result).length;
    return `<div class="card">
      <div class="item-head">
        <div>
          <div class="item-title">${r.location}</div>
          <div class="item-meta">${r.time}｜${r.inspector||'未填人員'}｜${r.shift}｜${r.weather}</div>
        </div>
        <span class="badge ${abn?'red':'green'}">${abn?abn+'異常':'正常'}</span>
      </div>
      <div class="small">完成 ${done} / ${r.items.length} 項</div>
      <button class="secondary" style="width:100%;margin-top:10px;" onclick="viewRecord('${r.id}')">查看明細</button>
    </div>`;
  }).join('');
}

function viewRecord(id) {
  const r=records.find(x=>x.id===id);
  if(!r) return;
  const detail = r.items.map(i=>`${i.seq}. ${i.item}｜${i.result||'未判定'}${i.note?'｜'+i.note:''}`).join("\n");
  alert(`${r.location}\n${r.time}\n\n${detail}`);
}

function exportCSV() {
  const header=["紀錄ID","時間","巡檢人員","班別","天氣","巡檢點","序號","類別","項目","標準","判定","說明","處理方式","預計完成日","照片檔名"];
  const lines=[header];
  records.forEach(r=>r.items.forEach(i=>{
    lines.push([r.id,r.time,r.inspector,r.shift,r.weather,r.location,i.seq,i.category,i.item,i.standard,i.result||"",i.note||"",i.action||"",i.due||"",i.photoName||""]);
  }));
  const csv = lines.map(row => row.map(v => `"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob(["\ufeff"+csv], {type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="社區巡檢紀錄_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a); a.click(); a.remove();
}

function clearDraft() {
  if(confirm("確定清除目前未送出的巡檢草稿？")) {
    draft={}; localStorage.removeItem("inspectionDraft_v3"); renderLocations(); updateStats(); showToast("已清除草稿");
  }
}

function clearAllRecords() {
  if(confirm("確定清除全部歷史紀錄？此動作無法復原。")) {
    records=[]; localStorage.removeItem("inspectionRecords_v3"); renderRecords(); updateStats(); showToast("已清除紀錄");
  }
}

init();
</script>
