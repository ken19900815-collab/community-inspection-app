<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f2f57" />
<title>社區走動式巡檢系統</title>
<style>
:root{
  --navy:#0f2f57;--blue:#1769aa;--light:#f5f7fb;--line:#e5e7eb;
  --green:#16a34a;--orange:#f59e0b;--red:#dc2626;--gray:#64748b;
  --dark:#111827;--card:#ffffff;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:var(--light);color:var(--dark);padding-bottom:112px}
header{background:linear-gradient(135deg,var(--navy),#154b7f);color:#fff;padding:18px 16px 16px;border-radius:0 0 24px 24px;position:sticky;top:0;z-index:10;box-shadow:0 8px 22px rgba(15,47,87,.18)}
header h1{font-size:20px;margin:0 0 8px;font-weight:800}
header .sub{font-size:13px;opacity:.9}
main{padding:14px;max-width:900px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 4px 14px rgba(15,23,42,.05)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{font-size:13px;font-weight:700;color:#334155;display:block;margin:6px 0}
input,select,textarea{width:100%;font-size:16px;border:1px solid #d1d5db;border-radius:12px;padding:11px;background:#fff}
textarea{min-height:74px;resize:vertical}
button{border:0;border-radius:14px;padding:12px 14px;font-weight:800;font-size:15px;cursor:pointer}
.btn-primary{background:var(--blue);color:#fff}
.btn-dark{background:var(--navy);color:#fff}
.btn-light{background:#e8eef6;color:var(--navy)}
.btn-green{background:var(--green);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-gray{background:#e5e7eb;color:#374151}
.stat{flex:1;min-width:130px;background:#fff;border-radius:16px;padding:12px;border:1px solid var(--line)}
.stat .num{font-size:24px;font-weight:900;color:var(--navy)}
.stat .lbl{font-size:12px;color:#64748b}
.progress{height:12px;background:#e2e8f0;border-radius:999px;overflow:hidden}
.progress>div{height:100%;background:linear-gradient(90deg,#22c55e,#0284c7);width:0%}
.loc-card{display:flex;align-items:center;justify-content:space-between;gap:8px}
.loc-title{font-size:17px;font-weight:900}
.pill{font-size:12px;border-radius:999px;padding:5px 8px;font-weight:800;display:inline-flex;align-items:center;gap:4px}
.pill.done{background:#dcfce7;color:#166534}
.pill.todo{background:#e0f2fe;color:#075985}
.pill.warn{background:#fef3c7;color:#92400e}
.pill.bad{background:#fee2e2;color:#991b1b}
.item-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:13px;margin:10px 0}
.item-card.ok{border-color:#bbf7d0;background:#f0fdf4}
.item-card.warn{border-color:#fde68a;background:#fffbeb}
.item-card.bad{border-color:#fecaca;background:#fef2f2}
.item-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.item-title{font-weight:900;font-size:16px}
.item-meta{font-size:12px;color:#475569;margin-top:4px}
.standard{font-size:13px;line-height:1.5;color:#334155;background:#f8fafc;border-radius:12px;padding:10px;margin:10px 0}
.status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.status-grid button{font-size:13px;padding:10px 4px;background:#eef2f7;color:#334155}
.status-grid button.active.ok{background:var(--green);color:white}
.status-grid button.active.warn{background:var(--orange);color:white}
.status-grid button.active.bad{background:var(--red);color:white}
.status-grid button.active.na{background:#64748b;color:white}
.need{border:2px solid var(--red)!important}
.hide{display:none!important}
.photo-preview{max-width:100%;max-height:180px;border-radius:12px;margin-top:8px;border:1px solid var(--line)}
.navbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);box-shadow:0 -8px 22px rgba(15,23,42,.08);z-index:99;padding:8px 10px calc(8px + env(safe-area-inset-bottom))}
.nav-inner{max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.nav-inner button{padding:10px 4px;font-size:13px;background:#eef2f7;color:#0f2f57}
.submit-bar{position:fixed;left:0;right:0;bottom:62px;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);z-index:98;padding:8px 10px}
.submit-inner{max-width:900px;margin:0 auto;display:flex;gap:8px;align-items:center}
.submit-inner .txt{flex:1;font-size:12px;color:#475569;font-weight:700}
.submit-inner button{min-width:145px}
button:disabled{opacity:.55;cursor:not-allowed;background:#94a3b8!important;color:#fff!important}
.err{color:var(--red);font-size:13px;font-weight:800;margin-top:8px}
.success{color:var(--green);font-size:14px;font-weight:900}
hr{border:0;border-top:1px solid var(--line);margin:14px 0}
.small{font-size:12px;color:#64748b;line-height:1.5}
.badge-num{background:#0f2f57;color:#fff;border-radius:999px;padding:3px 7px;font-size:12px}
@media(min-width:700px){.locs{display:grid;grid-template-columns:1fr 1fr;gap:10px}.item-list{display:grid;grid-template-columns:1fr 1fr;gap:10px}.item-card{margin:0}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}}
</style>
</head>

<header>

<nav class="navbar">

const LOCATIONS = [...new Set(ITEMS.map(x=>x.location))];
const STORE_KEY = "inspection_current_v4";
const REPORT_KEY = "inspection_reports_v4";

let state = loadState();
let currentLocation = LOCATIONS[0];

function defaultState(){
  const today = new Date().toISOString().slice(0,10);
  return {
    meta:{community:"", inspector:"", shift:"早班", weather:"", date:today, startedAt:new Date().toISOString(), submitted:false},
    answers:{}
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return defaultState();
}
function saveState(){
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  updateSubmitBar();
}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function ans(id){ if(!state.answers[id]) state.answers[id]={status:"",note:"",action:"",due:"",photo:"",photoName:""}; return state.answers[id];}

function calc(){
  const total = ITEMS.length;
  let done=0, abnormal=0, warn=0, invalid=0;
  const missing=[];
  for(const item of ITEMS){
    const a=state.answers[item.id]||{};
    const hasStatus=!!a.status;
    let valid=hasStatus;
    if(a.status==="異常" && (!a.note || !a.action)){ valid=false; }
    if(a.status==="待注意" && !a.note){ valid=false; }
    if(valid) done++;
    else {
      if(!hasStatus) missing.push(`${item.location}｜${item.item}：未判定`);
      else if(a.status==="異常") missing.push(`${item.location}｜${item.item}：異常說明/處理方式未填`);
      else if(a.status==="待注意") missing.push(`${item.location}｜${item.item}：待注意備註未填`);
      invalid++;
    }
    if(a.status==="異常") abnormal++;
    if(a.status==="待注意") warn++;
  }
  return {total, done, abnormal, warn, invalid, missing, pct:Math.round(done/total*100)};
}
function locStats(loc){
  const items=ITEMS.filter(x=>x.location===loc);
  let done=0, abnormal=0, warn=0;
  for(const item of items){
    const a=state.answers[item.id]||{};
    let valid=!!a.status;
    if(a.status==="異常" && (!a.note || !a.action)) valid=false;
    if(a.status==="待注意" && !a.note) valid=false;
    if(valid) done++;
    if(a.status==="異常") abnormal++;
    if(a.status==="待注意") warn++;
  }
  return {total:items.length,done,abnormal,warn,pct:Math.round(done/items.length*100)};
}

function bindMeta(){
  ["community","inspector","shift","weather","date"].forEach(k=>{
    const el=document.getElementById("meta_"+k);
    if(el){
      el.value=state.meta[k]||"";
      el.oninput=()=>{state.meta[k]=el.value; saveState(); renderAll();};
    }
  });
}

  const s=locStats(loc);

  return `<div class="card loc-card" onclick="openLocation('${esc(loc)}')">
    <div>
      <div class="loc-title">${esc(loc)}</div>
      <div class="small">完成 ${s.done}/${s.total} ｜ 異常 ${s.abnormal} ｜ 待注意 ${s.warn}</div>
      <div class="progress" style="margin-top:8px"><div style="width:${s.pct}%"></div></div>
    </div>
    <div><span class="pill ${cls}">${txt}</span></div>
  </div>`;
}

    </div>
    <div class="item-list">${items.map(renderItem).join("")}</div>
  `;
}
function renderItem(item){
  const a=ans(item.id);
  const cls=a.status==="正常"?"ok":a.status==="待注意"?"warn":a.status==="異常"?"bad":"";
  const needDetail = a.status==="異常" || a.status==="待注意";
  const needClass = (a.status==="異常" && (!a.note || !a.action)) || (a.status==="待注意" && !a.note) ? "need":"";
  return `<div class="item-card ${cls}" id="card_${item.id}">
    <div class="item-head">
      <div>
        <div class="item-title">${item.seq}. ${esc(item.item)}</div>
        <div class="item-meta">${esc(item.category)}</div>
      </div>
      <span class="pill ${a.status==='異常'?'bad':a.status==='待注意'?'warn':a.status==='正常'?'done':'todo'}">${a.status||"未判定"}</span>
    </div>
    <div class="standard">${esc(item.standard)}</div>
    <div class="status-grid">
      ${["正常","待注意","異常","N/A"].map(st=>{
        const c=st==="正常"?"ok":st==="待注意"?"warn":st==="異常"?"bad":"na";
        return `<button class="${a.status===st?'active '+c:''}" onclick="setStatus('${item.id}','${st}')">${st}</button>`;
      }).join("")}
    </div>
    <div class="${needDetail?'':'hide'}" style="margin-top:10px">
      <label>${a.status==="異常"?"異常說明（必填）":"待注意備註（必填）"}</label>
      <textarea class="${needClass}" oninput="setField('${item.id}','note',this.value)" placeholder="請描述現場狀況、位置、影響程度">${esc(a.note)}</textarea>
      <div class="${a.status==='異常'?'':'hide'}">
        <label>處理方式（異常必填）</label>
        <textarea class="${needClass}" oninput="setField('${item.id}','action',this.value)" placeholder="例：已通報機電、已封鎖區域、預計請廠商修繕">${esc(a.action)}</textarea>
        <label>預計完成日</label>
        <input type="date" value="${esc(a.due)}" onchange="setField('${item.id}','due',this.value)">
      </div>
      <label>拍照 / 上傳照片</label>
      <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(event,'${item.id}')">
      ${a.photo?`<img class="photo-preview" src="${a.photo}" alt="photo"><div class="small">${esc(a.photoName||"已上傳照片")}</div>`:""}
    </div>
  </div>`;
}
function setStatus(id, status){
  const a=ans(id); a.status=status;
  if(status==="正常" || status==="N/A"){ a.note=""; a.action=""; a.due=""; a.photo=""; a.photoName=""; }
  saveState(); renderAll(false);
}
function setField(id,k,v){ ans(id)[k]=v; saveState(); updateSubmitBar(); }
function handlePhoto(e,id){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const max=900; let w=img.width,h=img.height;
      if(w>h && w>max){h=Math.round(h*max/w);w=max}
      else if(h>max){w=Math.round(w*max/h);h=max}
      const canvas=document.createElement("canvas"); canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const a=ans(id); a.photo=canvas.toDataURL("image/jpeg",0.72); a.photoName=file.name;
      saveState(); renderAll(false);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function markAllNormal(loc){
  ITEMS.filter(x=>x.location===loc).forEach(item=>{ if(!ans(item.id).status) ans(item.id).status="正常"; });

}
function nextIncomplete(){
  const items=ITEMS.filter(x=>x.location===currentLocation);
  for(const item of items){
    const a=state.answers[item.id]||{};

    if(a.status==="異常" && (!a.note || !a.action)) valid=false;
    if(a.status==="待注意" && !a.note) valid=false;
    if(!valid){document.getElementById("card_"+item.id)?.scrollIntoView({behavior:"smooth",block:"center"}); return;}
  }
  alert("本巡檢點已完成。");
}

    <div class="card"><h2 style="margin:0">送出紀錄</h2><p class="small">資料目前儲存在本手機瀏覽器。之後接 LINE 後端 / 資料庫即可雲端同步。</p></div>
    ${reports.length?reports.slice().reverse().map(r=>`<div class="card">
      <b>${esc(r.meta.date)}｜${esc(r.meta.inspector||"未填人員")}</b>
      <div class="small">送出時間：${new Date(r.submittedAt).toLocaleString()}｜異常 ${r.summary.abnormal}｜待注意 ${r.summary.warn}</div>
    </div>`).join(""):`<div class="card">尚無送出紀錄。</div>`}
  `;
}
function showPage(page){
  ["Home","Locations","Inspection","Abnormal","Reports"].forEach(n=>document.getElementById("page"+n).classList.add("hide"));
  if(page==="home") document.getElementById("pageHome").classList.remove("hide");
  if(page==="locations") document.getElementById("pageLocations").classList.remove("hide");
  if(page==="inspection") document.getElementById("pageInspection").classList.remove("hide");
  if(page==="abnormal") document.getElementById("pageAbnormal").classList.remove("hide");
  if(page==="reports") document.getElementById("pageReports").classList.remove("hide");
  renderAll(false);
  window.scrollTo({top:0,behavior:"smooth"});
}
function renderAll(resetHome=true){
  renderHome(); renderLocations(); renderInspection(); renderAbnormal(); renderReports(); updateSubmitBar();
}
function updateSubmitBar(){
  const c=calc();
  const btn=document.getElementById("globalSubmitBtn");
  const hint=document.getElementById("submitHint");
  const metaOK=!!state.meta.inspector && !!state.meta.date;
  btn.disabled=!(c.invalid===0 && metaOK);
  if(!metaOK) hint.textContent="請先填巡檢人員與日期";
  else if(c.invalid>0) hint.textContent=`尚有 ${c.invalid} 項未完成，完成後才可一次總送出`;
  else hint.textContent="全部巡檢點完成，可一次總送出";
}
function submitAll(){
  const c=calc();
  if(!state.meta.inspector || !state.meta.date){ alert("請先填巡檢人員與日期。"); return; }
  if(c.invalid>0){
    alert("尚未完成，前 10 筆：\n\n"+c.missing.slice(0,10).join("\n"));
    return;
  }
  const report={meta:state.meta, answers:state.answers, submittedAt:new Date().toISOString(), summary:c};
  let reports=[]; try{reports=JSON.parse(localStorage.getItem(REPORT_KEY)||"[]")}catch(e){}
  reports.push(report); localStorage.setItem(REPORT_KEY, JSON.stringify(reports));
  alert("✅ 本次巡檢已總送出並儲存在本機。\n如要交給主管，請匯出 CSV。");
  exportCSV(true);
}
function exportCSV(auto){
  const header=["巡檢日期","巡檢時間","巡檢人員","班別","天氣","巡檢點","序號","類別","點檢項目","檢查標準","判定","異常/備註說明","處理方式","預計完成日","照片"];
  const lines=[header];
  for(const item of ITEMS){
    const a=state.answers[item.id]||{};
    lines.push([state.meta.date,new Date().toLocaleString(),state.meta.inspector,state.meta.shift,state.meta.weather,item.location,item.seq,item.category,item.item,item.standard,a.status||"",a.note||"",a.action||"",a.due||"",a.photoName|| (a.photo?"已附照片":"")]);
  }
  const csv="\ufeff"+lines.map(r=>r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=`巡檢紀錄_${state.meta.date||"未填日期"}.csv`; a.click();
  URL.revokeObjectURL(url);
}
function newInspection(){
  if(confirm("確定清空目前巡檢資料，開始新一輪巡檢？")){
    state=defaultState(); saveState(); renderAll(); showPage("home");
  }
}
renderAll();
</script>
