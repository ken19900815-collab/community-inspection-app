<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>社區巡檢管理系統</title>
<style>
:root {
  --bg:#f4f6fb; --card:#ffffff; --ink:#162033; --muted:#6b7280; --blue:#1d4ed8;
  --green:#16a34a; --orange:#f59e0b; --red:#dc2626; --line:#e5e7eb;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{position:sticky;top:0;z-index:10;background:#0f172a;color:white;padding:14px 16px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
h1{font-size:20px;margin:0} .sub{font-size:12px;opacity:.85;margin-top:4px}
main{padding:14px;max-width:900px;margin:auto;padding-bottom:90px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.stat{background:white;border-radius:16px;padding:14px;box-shadow:0 2px 10px rgba(15,23,42,.06)}
.stat b{font-size:24px;display:block;margin-top:6px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 3px 12px rgba(15,23,42,.06)}
.loc-card{cursor:pointer} .loc-card:active{transform:scale(.99)}
.row{display:flex;gap:8px;align-items:center;justify-content:space-between}
.badge{font-size:12px;border-radius:999px;padding:4px 8px;background:#eef2ff;color:#1e40af}
.badge.red{background:#fee2e2;color:#991b1b} .badge.green{background:#dcfce7;color:#166534} .badge.orange{background:#ffedd5;color:#9a3412}
button{border:0;border-radius:14px;padding:12px 14px;background:var(--blue);color:white;font-size:16px;font-weight:700;cursor:pointer}
button.secondary{background:#e5e7eb;color:#111827} button.danger{background:var(--red)} button.ok{background:var(--green)} button.warn{background:var(--orange);color:#111827}
.btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.btns button{font-size:14px;padding:10px 6px;background:#f1f5f9;color:#334155;border:1px solid #dbe3ef}
.btns button.active.ok{background:#dcfce7;border-color:var(--green);color:#166534}
.btns button.active.warn{background:#ffedd5;border-color:var(--orange);color:#9a3412}
.btns button.active.danger{background:#fee2e2;border-color:var(--red);color:#991b1b}
.btns button.active.na{background:#e5e7eb;border-color:#6b7280;color:#111827}
.item-title{font-weight:800;font-size:16px} .std{color:#475569;font-size:13px;line-height:1.5;margin-top:6px}
.meta{font-size:12px;color:var(--muted);margin-top:3px}
textarea,input,select{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:10px;font-size:15px;background:white}
.hidden{display:none!important} .photo-preview{max-width:100%;border-radius:12px;margin-top:8px;border:1px solid #e5e7eb}
.panel{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0} .panel button{font-size:14px;padding:10px 12px}
.bottom{position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid #e5e7eb;padding:10px 14px;display:flex;gap:8px;z-index:20}
.bottom button{flex:1}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px} .bar{height:100%;background:var(--green);width:0%}
.item-card.abnormal{border-color:#fecaca;background:#fff7f7} .item-card.attention{border-color:#fed7aa;background:#fffaf0} .item-card.normal{border-color:#bbf7d0;background:#f7fff9}
.small{font-size:12px;color:#64748b} .req{color:var(--red);font-weight:bold}
@media(min-width:720px){.grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<header>
  <h1>社區巡檢管理系統</h1>
  <div class="sub">手機巡檢／拍照紀錄／異常追蹤／本機儲存／CSV匯出</div>
</header>
<main>
  <section id="home">
    <div class="grid">
      <div class="stat">巡檢點<b id="statLoc">0</b></div>
      <div class="stat">總項目<b id="statItems">0</b></div>
      <div class="stat">已填寫<b id="statDone">0</b></div>
      <div class="stat">異常<b id="statBad">0</b></div>
    </div>
    <div class="card">
      <label>巡檢人員</label>
      <input id="inspector" placeholder="請輸入姓名">
      <div style="height:8px"></div>
      <label>班別</label>
      <select id="shift"><option>早班</option><option>中班</option><option>晚班</option><option>機動</option></select>
      <div style="height:8px"></div>
      <label>天氣</label>
      <input id="weather" placeholder="晴／雨／陰">
    </div>
    <h2>巡檢點</h2>
    <div id="locations"></div>
  </section>

  <section id="inspect" class="hidden">
    <div class="panel">
      <button class="secondary" onclick="goHome()">← 返回巡檢點</button>
      <button onclick="markAllNormal()">本區全設正常</button>
    </div>
    <div class="card">
      <div class="row"><h2 id="locTitle" style="margin:0"></h2><span class="badge" id="locProgress"></span></div>
      <div class="progress"><div class="bar" id="locBar"></div></div>
    </div>
    <div id="items"></div>
  </section>

  <section id="abnormalPage" class="hidden">
    <div class="panel"><button class="secondary" onclick="goHome()">← 返回首頁</button></div>
    <h2>異常／待注意追蹤</h2>
    <div id="abnormalList"></div>
  </section>
</main>

<div class="bottom">
  <button onclick="showAbnormal()">異常追蹤</button>
  <button class="secondary" onclick="exportCSV()">匯出CSV</button>
  <button class="danger" onclick="clearAll()">清空資料</button>
</div>

rd": "升降順暢，感應器正常，無卡頓"}, {"id": "141", "seq": 141, "location": "後哨", "category": "設備設施", "item": "緊急警報/一鍵求助", "standard": "按鈕功能正常，線路無中斷"}, {"id": "142", "seq": 142, "location": "後哨", "category": "環境衛生", "item": "哨所清潔", "standard": "內部整潔，無食物殘留，制服儀容端正"}, {"id": "143", "seq": 143, "location": "後哨", "category": "緊急應變", "item": "緊急聯絡表張貼", "standard": "最新版緊急電話表（警局/消防/物管公司）張貼於明顯位置"}, {"id": "144", "seq": 144, "location": "後哨", "category": "緊急應變", "item": "值班日誌記錄", "standard": "每班次完整填寫，無空白欄位"}];
const KEY = "community_inspection_records_v3";
let records = JSON.parse(localStorage.getItem(KEY) || "{}");
let currentLocation = "";

function save(){ localStorage.setItem(KEY, JSON.stringify(records)); refreshStats(); }
function locations(){ return [...new Set(CHECK_ITEMS.map(x=>x.location))]; }
function locItems(loc){ return CHECK_ITEMS.filter(x=>x.location===loc); }
function rec(id){ if(!records[id]) records[id]={status:"",note:"",action:"",due:"",photo:"",updatedAt:""}; return records[id]; }
function statusLabel(s){ return s==="normal"?"正常":s==="attention"?"待注意":s==="abnormal"?"異常":s==="na"?"不適用":"未填"; }
function statusClass(s){ return s==="normal"?"normal":s==="attention"?"attention":s==="abnormal"?"abnormal":""; }

function refreshStats(){
  document.getElementById("statLoc").textContent=locations().length;
  document.getElementById("statItems").textContent=CHECK_ITEMS.length;
  const vals=Object.values(records);
  document.getElementById("statDone").textContent=vals.filter(r=>r.status).length;
  document.getElementById("statBad").textContent=vals.filter(r=>r.status==="abnormal").length;
  renderLocations();
}

function renderLocations(){
  const box=document.getElementById("locations"); box.innerHTML="";
  locations().forEach(loc=>{
    const its=locItems(loc), done=its.filter(i=>rec(i.id).status).length, bad=its.filter(i=>rec(i.id).status==="abnormal").length, att=its.filter(i=>rec(i.id).status==="attention").length;
    const div=document.createElement("div"); div.className="card loc-card"; div.onclick=()=>openLoc(loc);
    div.innerHTML=`<div class="row"><div><div class="item-title">${loc}</div><div class="meta">${done} / ${its.length} 項完成</div></div><div>${bad?`<span class="badge red">異常 ${bad}</span>`:att?`<span class="badge orange">待注意 ${att}</span>`:`<span class="badge green">正常</span>`}</div></div><div class="progress"><div class="bar" style="width:${Math.round(done/its.length*100)}%"></div></div>`;
    box.appendChild(div);
  });
}

function openLoc(loc){
  currentLocation=loc;
  document.getElementById("home").classList.add("hidden");
  document.getElementById("abnormalPage").classList.add("hidden");
  document.getElementById("inspect").classList.remove("hidden");
  document.getElementById("locTitle").textContent=loc;
  renderItems();
}

function renderItems(){
  const box=document.getElementById("items"); box.innerHTML="";
  const its=locItems(currentLocation);
  const done=its.filter(i=>rec(i.id).status).length;
  document.getElementById("locProgress").textContent=`${done} / ${its.length}`;
  document.getElementById("locBar").style.width=Math.round(done/its.length*100)+"%";
  its.forEach(i=>{
    const r=rec(i.id);
    const div=document.createElement("div"); div.className=`card item-card ${statusClass(r.status)}`;
    div.innerHTML=`
      <div class="row"><span class="badge">${i.category}</span><span class="small">#${i.seq}</span></div>
      <div class="item-title">${i.item}</div>
      <div class="std">標準：${i.standard}</div>
      <div class="btns">
        <button class="ok ${r.status==='normal'?'active':''}" onclick="setStatus('${i.id}','normal')">正常</button>
        <button class="warn ${r.status==='attention'?'active':''}" onclick="setStatus('${i.id}','attention')">待注意</button>
        <button class="danger ${r.status==='abnormal'?'active':''}" onclick="setStatus('${i.id}','abnormal')">異常</button>
        <button class="na ${r.status==='na'?'active':''}" onclick="setStatus('${i.id}','na')">N/A</button>
      </div>
      <div class="${(r.status==='abnormal'||r.status==='attention')?'':'hidden'}" style="margin-top:10px">
        <label>${r.status==='abnormal'?'<span class="req">*</span> ':''}異常/待注意說明</label>
        <textarea oninput="updateField('${i.id}','note',this.value)" placeholder="請詳述狀況">${r.note||''}</textarea>
        <label>處理方式</label>
        <textarea oninput="updateField('${i.id}','action',this.value)" placeholder="已處理/通報廠商/列管追蹤">${r.action||''}</textarea>
        <label>預計完成日</label>
        <input type="date" value="${r.due||''}" onchange="updateField('${i.id}','due',this.value)">
        <label>拍照上傳</label>
        <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(event,'${i.id}')">
        ${r.photo?`<img class="photo-preview" src="${r.photo}">`:''}
      </div>
    `;
    box.appendChild(div);
  });
}

function setStatus(id,status){ const r=rec(id); r.status=status; r.updatedAt=new Date().toLocaleString(); save(); renderItems(); }
function updateField(id,field,val){ const r=rec(id); r[field]=val; r.updatedAt=new Date().toLocaleString(); save(); }
function handlePhoto(e,id){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{ rec(id).photo=reader.result; rec(id).updatedAt=new Date().toLocaleString(); save(); renderItems(); };
  reader.readAsDataURL(file);
}
function markAllNormal(){ if(!confirm("確定將本巡檢點未填項目全部設為正常？")) return; locItems(currentLocation).forEach(i=>{ if(!rec(i.id).status) setStatusNoRender(i.id,"normal"); }); save(); renderItems(); }
function setStatusNoRender(id,status){ const r=rec(id); r.status=status; r.updatedAt=new Date().toLocaleString(); }
function goHome(){ document.getElementById("inspect").classList.add("hidden"); document.getElementById("abnormalPage").classList.add("hidden"); document.getElementById("home").classList.remove("hidden"); refreshStats(); }
function showAbnormal(){
  document.getElementById("home").classList.add("hidden"); document.getElementById("inspect").classList.add("hidden"); document.getElementById("abnormalPage").classList.remove("hidden");
  const box=document.getElementById("abnormalList"); box.innerHTML="";
  const list=CHECK_ITEMS.filter(i=>["abnormal","attention"].includes(rec(i.id).status));
  if(!list.length){ box.innerHTML='<div class="card">目前沒有異常或待注意。</div>'; return; }
  list.forEach(i=>{ const r=rec(i.id); const div=document.createElement("div"); div.className=`card item-card ${statusClass(r.status)}`; div.innerHTML=`<div class="row"><b>${i.location}</b><span class="badge ${r.status==='abnormal'?'red':'orange'}">${statusLabel(r.status)}</span></div><div class="item-title">${i.item}</div><div class="std">${i.standard}</div><p><b>說明：</b>${r.note||'未填'}</p><p><b>處理：</b>${r.action||'未填'}</p><p><b>完成日：</b>${r.due||'未填'}</p>${r.photo?`<img class="photo-preview" src="${r.photo}">`:''}`; box.appendChild(div); });
}
function exportCSV(){
  const inspector=document.getElementById("inspector").value||"";
  const shift=document.getElementById("shift").value||"";
  const weather=document.getElementById("weather").value||"";
  const header=["日期時間","巡檢人員","班別","天氣","巡檢點","類別","點檢項目","檢查標準","判定","說明","處理方式","預計完成日","有無照片"];
  const lines=[header];
  CHECK_ITEMS.forEach(i=>{ const r=rec(i.id); lines.push([r.updatedAt||"",inspector,shift,weather,i.location,i.category,i.item,i.standard,statusLabel(r.status),r.note||"",r.action||"",r.due||"",r.photo?"有":"無"]); });
  const csv="\ufeff"+lines.map(row=>row.map(v=>`"${String(v).replaceAll('"','""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="社區巡檢紀錄_"+new Date().toISOString().slice(0,10)+".csv"; a.click();
}
function clearAll(){ if(confirm("確定清空本機所有巡檢紀錄？")){ records={}; save(); goHome(); } }
refreshStats();
</script>
