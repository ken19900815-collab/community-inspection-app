<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>社區巡檢管理系統</title>
<style>
:root{--blue:#12345b;--light:#f3f6fb;--green:#1b8f4d;--orange:#f59e0b;--red:#dc2626;--gray:#667085;--card:#fff;--line:#d9e2ef;}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",Arial,sans-serif;background:var(--light);color:#111827;padding-bottom:110px}.top{background:linear-gradient(135deg,#0f2f55,#1e5799);color:white;padding:18px 16px 16px;border-bottom-left-radius:22px;border-bottom-right-radius:22px;box-shadow:0 6px 18px rgba(0,0,0,.18)}.top h1{font-size:22px;margin:0 0 8px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.meta input,.meta select{width:100%;border:0;border-radius:12px;padding:11px;font-size:15px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 12px}.stat{background:#fff;border-radius:14px;text-align:center;padding:10px 4px;box-shadow:0 2px 10px rgba(16,24,40,.07)}.stat b{display:block;font-size:20px}.stat span{font-size:12px;color:var(--gray)}.tabs{display:flex;gap:8px;padding:0 12px 10px;position:sticky;top:0;background:var(--light);z-index:20}.tabs button{flex:1;border:0;border-radius:14px;padding:12px 6px;background:#e7edf7;color:#18385f;font-weight:700}.tabs button.active{background:var(--blue);color:#fff}.page{display:none;padding:0 12px}.page.active{display:block}.location-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.loc-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;min-height:92px;box-shadow:0 2px 8px rgba(16,24,40,.06)}.loc-card.done{border-color:#8bd0a8;background:#f0fff5}.loc-title{font-weight:800;font-size:16px}.loc-small{font-size:13px;color:var(--gray);margin-top:7px}.loc-badge{display:inline-block;margin-top:9px;border-radius:999px;padding:4px 8px;font-size:12px;background:#edf2f7}.section-title{display:flex;justify-content:space-between;align-items:center;margin:12px 0}.section-title h2{font-size:20px;margin:0}.back{border:0;background:#fff;border-radius:12px;padding:9px 12px;font-weight:700}.item-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(16,24,40,.06)}.item-card.normal{border-left:8px solid var(--green)}.item-card.watch{border-left:8px solid var(--orange);background:#fffbeb}.item-card.bad{border-left:8px solid var(--red);background:#fff1f2}.item-card.na{border-left:8px solid #94a3b8}.cat{display:inline-block;background:#e9eff8;color:#1e3a5f;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700}.item-title{font-size:17px;font-weight:800;margin:9px 0 6px}.standard{font-size:14px;color:#475467;line-height:1.45;background:#f8fafc;border-radius:12px;padding:9px}.judge{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:12px}.judge button{border:1px solid var(--line);border-radius:12px;padding:11px 4px;background:#fff;font-weight:800}.judge button.sel.normal{background:#dcfce7;color:#166534;border-color:#86efac}.judge button.sel.watch{background:#fef3c7;color:#92400e;border-color:#fbbf24}.judge button.sel.bad{background:#fee2e2;color:#991b1b;border-color:#f87171}.judge button.sel.na{background:#e2e8f0;color:#334155}.detail{display:none;margin-top:10px}.detail.show{display:block}.field{margin-top:10px}.field label{display:block;font-weight:700;font-size:14px;margin-bottom:5px}textarea,input[type="date"],input[type="text"]{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;font-size:16px;background:white}textarea{min-height:74px;resize:vertical}.photo-preview{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.photo-preview img{width:70px;height:70px;object-fit:cover;border-radius:10px;border:1px solid #ddd}.bottom-submit{position:fixed;left:0;right:0;bottom:0;z-index:9999;background:rgba(255,255,255,.96);box-shadow:0 -4px 18px rgba(0,0,0,.18);padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:none}.bottom-submit.show{display:block}.submit-btn{width:100%;border:0;border-radius:16px;padding:16px;background:var(--red);color:white;font-size:19px;font-weight:900}.subline{text-align:center;font-size:12px;color:#667085;margin-top:5px}.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.toolbtn{border:0;border-radius:14px;padding:13px;background:var(--blue);color:white;font-weight:800}.toolbtn.gray{background:#475467}.record,.abnormal{background:#fff;border-radius:16px;padding:12px;margin-bottom:10px;border:1px solid var(--line)}.abnormal{border-left:8px solid var(--red)}.empty{text-align:center;color:#667085;background:#fff;border-radius:16px;padding:24px;margin-top:12px}.toast{position:fixed;left:16px;right:16px;bottom:90px;background:#111827;color:white;padding:13px;border-radius:14px;text-align:center;z-index:10000;display:none}.toast.show{display:block}@media(min-width:760px){.app{max-width:760px;margin:0 auto}.bottom-submit{left:50%;transform:translateX(-50%);max-width:760px}.location-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="app">
<header class="top">
<h1>社區巡檢管理系統</h1>
<div>LINE LIFF / 手機巡檢版</div>
<div class="meta">
<input id="inspector" placeholder="巡檢人員姓名" />
<select id="shift"><option>早班</option><option>中班</option><option>晚班</option><option>夜班</option></select>
<input id="weather" placeholder="天氣，例如晴/雨" />
<input id="community" placeholder="社區名稱" />
</div>
</header>
<div class="stats">
<div class="stat"><b id="stTotal">0</b><span>總項目</span></div><div class="stat"><b id="stDone">0</b><span>已判定</span></div><div class="stat"><b id="stBad">0</b><span>異常</span></div><div class="stat"><b id="stPct">0%</b><span>完成率</span></div>
</div>
<nav class="tabs">
<button id="tabLocations" class="active" onclick="showPage('locations')">巡檢點</button>
<button id="tabAbnormal" onclick="showPage('abnormal')">異常追蹤</button>
<button id="tabRecords" onclick="showPage('records')">紀錄匯出</button>
</nav>
<main id="locations" class="page active"><div class="section-title"><h2>選擇巡檢點</h2></div><div id="locationGrid" class="location-grid"></div></main>
<main id="inspection" class="page"><div class="section-title"><button class="back" onclick="showPage('locations')">← 返回</button><h2 id="currentLocationTitle"></h2></div><div id="itemList"></div></main>
<main id="abnormal" class="page"><div class="section-title"><h2>異常追蹤</h2></div><div id="abnormalList"></div></main>
<main id="records" class="page"><div class="section-title"><h2>巡檢紀錄</h2></div><div class="toolbar"><button class="toolbtn" onclick="exportCSV()">匯出 CSV</button><button class="toolbtn gray" onclick="clearAll()">清除本機資料</button></div><div id="recordList"></div></main>
</div>
<div id="submitBar" class="bottom-submit"><button class="submit-btn" onclick="submitInspection()">送出巡檢</button><div class="subline" id="submitHint">請先選擇巡檢點並完成判定</div></div>
<div id="toast" class="toast"></div>
<script>
const locations=['B1庫房','B2庫房','B3庫房','B4庫房','A棟一樓安全梯','泳池','2樓家教室','2樓桌球室','2樓健身房','2樓休息室','14樓中繼水塔','26樓廚房','頂樓水池','B棟一樓安全梯','B棟頂樓','後哨'];
const common=[['消防安全','滅火器有效期限','有效期限未逾期，壓力表指針在綠色範圍'],['消防安全','消防設備外觀','箱門可正常開啟，水帶完好，閥門無鏽蝕'],['消防安全','緊急照明或出口指示','亮燈正常，無遮蔽物'],['環境衛生','地面清潔','無垃圾、油污、紙屑，走道通暢'],['環境衛生','是否有積水','地面乾燥，無滲水或積水'],['環境衛生','是否有異味','無霉味、臭味、油煙味或排水異味'],['設備設施','照明是否正常','燈具全數正常，無閃爍或不亮'],['保全管控','門禁或鎖具是否正常','門鎖、電子鎖、門弓器功能正常'],['保全管控','CCTV或監視設備是否正常','畫面清晰，角度正確，無遮蔽']];
const specials={
'泳池':[['公設管理','水質清澈度','水質清澈無漂浮物，無明顯混濁'],['緊急應變','救生設備','救生圈、救生桿完整且放置明顯'],['公設管理','防滑狀況','池畔地面防滑，無破損隆起'],['設備設施','排水溝','排水順暢，無堵塞或異味'],['公設管理','警示標語','安全告示清楚完整，無脫落']],
'2樓健身房':[['設備設施','器材安全','器材運作正常，無異音或危險鬆動'],['設備設施','器材螺絲固定','螺絲固定無鬆脫'],['環境衛生','地墊清潔','地墊乾淨無破損，無汗漬異味'],['設備設施','冷氣通風','空調及通風正常'],['公設管理','使用規範公告','使用規範張貼清楚']],
'2樓桌球室':[['公設管理','桌球桌狀況','桌面平整無破損'],['公設管理','球網固定','球網固定正常，無明顯鬆脫'],['環境衛生','地面防滑','地面乾燥防滑，無障礙物'],['設備設施','照明亮度','照明充足無閃爍']],
'2樓家教室':[['公設管理','桌椅完整','桌椅無破損，排列整齊'],['環境衛生','白板清潔','白板清潔可使用'],['設備設施','插座安全','插座無鬆脫、焦黑、裸線'],['設備設施','冷氣照明','冷氣及照明正常']],
'2樓休息室':[['公設管理','沙發桌椅','沙發桌椅完整無破損'],['環境衛生','環境整潔','環境整潔無垃圾'],['設備設施','空調照明','空調與照明正常'],['公設管理','公共用品','公共用品整齊無短缺']],
'14樓中繼水塔':[['水池水塔','水塔外觀','外觀完整無鏽蝕破損'],['水池水塔','水位狀況','水位正常無異常警報'],['機電設備','加壓馬達','馬達運轉正常，無異音'],['設備設施','管線滲漏','管線無滲漏'],['保全管控','機房門鎖','門鎖正常，非授權不可進入']],
'26樓廚房':[['廚房衛生','冰箱溫度','冷藏冷凍溫度正常'],['廚房衛生','食材保存','食材分類保存並覆蓋標示'],['廚房衛生','油水分離槽','油水分離槽清潔無溢流'],['廚房衛生','排水溝','排水溝清潔無菜渣油垢'],['廚房衛生','抽油煙機','抽油煙機濾網無厚重油垢'],['消防安全','瓦斯安全','瓦斯管線與開關無異常'],['廚房衛生','調味料封存','調味料封好或冷藏'],['廚房衛生','廚房地面清潔','地面無油垢菜渣積水']],
'頂樓水池':[['水池水塔','水池蓋密合','水池蓋密合上鎖'],['水池水塔','水池周邊清潔','周邊無垃圾落葉積水'],['緊急應變','防墜安全','護欄與防墜設施完整'],['設備設施','管線滲漏','管線無滲漏'],['水池水塔','水位狀況','水位正常']],
'B棟頂樓':[['設備設施','排水孔','排水孔暢通無堵塞'],['設備設施','防水層','防水層無破損隆起'],['設備設施','女兒牆','女兒牆無裂縫或剝落'],['保全管控','門鎖','頂樓門鎖正常'],['環境衛生','雜物堆置','無雜物堆置或危險物品']],
'後哨':[['保全管控','門禁紀錄','門禁紀錄完整'],['保全管控','訪客登記','訪客登記完整'],['保全管控','CCTV畫面','CCTV畫面清晰'],['緊急應變','緊急聯絡表','最新版緊急聯絡表張貼'],['緊急應變','值班日誌','值班日誌完整無空白'],['環境衛生','哨所清潔','哨所整潔無食物殘留']]
};
function getItems(loc){let arr=[...common]; if(loc.includes('安全梯'))arr=arr.concat([['消防安全','通道是否暢通','樓梯及平台無雜物阻礙'],['消防安全','防火門是否關閉','防火門保持關閉且功能正常'],['消防安全','樓梯扶手','扶手穩固無鬆動'],['環境衛生','是否堆放雜物','無私人雜物堆置']]); if(specials[loc])arr=arr.concat(specials[loc]); return arr.map((x,i)=>({id:loc+'_'+i,loc,category:x[0],item:x[1],standard:x[2]}));}
const allItems=locations.flatMap(getItems); let currentLoc=''; let state=JSON.parse(localStorage.getItem('inspectionState')||'{}'); let records=JSON.parse(localStorage.getItem('inspectionRecords')||'[]');
function save(){localStorage.setItem('inspectionState',JSON.stringify(state));localStorage.setItem('inspectionRecords',JSON.stringify(records));updateStats();}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));if(id==='locations')document.getElementById('tabLocations').classList.add('active');if(id==='abnormal'){document.getElementById('tabAbnormal').classList.add('active');renderAbnormal()}if(id==='records'){document.getElementById('tabRecords').classList.add('active');renderRecords()}document.getElementById('submitBar').classList.toggle('show',id==='inspection');}
function renderLocations(){const grid=document.getElementById('locationGrid');grid.innerHTML='';locations.forEach(loc=>{const items=getItems(loc);const done=items.filter(it=>state[it.id]?.result).length;const bad=items.filter(it=>state[it.id]?.result==='異常').length;const card=document.createElement('div');card.className='loc-card '+(done===items.length?'done':'');card.onclick=()=>openLoc(loc);card.innerHTML=`<div class="loc-title">${loc}</div><div class="loc-small">${done}/${items.length} 已完成｜異常 ${bad}</div><span class="loc-badge">點擊開始巡檢</span>`;grid.appendChild(card)});}
function openLoc(loc){currentLoc=loc;document.getElementById('currentLocationTitle').textContent=loc;renderItems();showPage('inspection');}
function renderItems(){const list=document.getElementById('itemList');list.innerHTML='';getItems(currentLoc).forEach(it=>{const s=state[it.id]||{};const cls=s.result==='正常'?'normal':s.result==='待注意'?'watch':s.result==='異常'?'bad':s.result==='不適用'?'na':'';const card=document.createElement('div');card.className='item-card '+cls;card.innerHTML=`<span class="cat">${it.category}</span><div class="item-title">${it.item}</div><div class="standard">標準：${it.standard}</div><div class="judge"><button class="${s.result==='正常'?'sel normal':''}" onclick="setResult('${it.id}','正常')">正常</button><button class="${s.result==='待注意'?'sel watch':''}" onclick="setResult('${it.id}','待注意')">待注意</button><button class="${s.result==='異常'?'sel bad':''}" onclick="setResult('${it.id}','異常')">異常</button><button class="${s.result==='不適用'?'sel na':''}" onclick="setResult('${it.id}','不適用')">N/A</button></div><div class="detail ${s.result==='異常'||s.result==='待注意'?'show':''}"><div class="field"><label>異常/備註說明</label><textarea oninput="setField('${it.id}','note',this.value)" placeholder="請描述狀況">${s.note||''}</textarea></div><div class="field"><label>處理方式</label><textarea oninput="setField('${it.id}','action',this.value)" placeholder="請填寫處理方式或交辦單位">${s.action||''}</textarea></div><div class="field"><label>預計完成日</label><input type="date" value="${s.due||''}" onchange="setField('${it.id}','due',this.value)"></div><div class="field"><label>拍照上傳 / 選擇照片</label><input type="file" accept="image/*" capture="environment" multiple onchange="handlePhotos('${it.id}',this.files)"><div class="photo-preview" id="photo_${safeId(it.id)}">${(s.photos||[]).map(src=>`<img src="${src}">`).join('')}</div></div></div>`;list.appendChild(card)});document.getElementById('submitHint').textContent=`目前巡檢點：${currentLoc}`;}
function safeId(id){return id.replace(/[^a-zA-Z0-9]/g,'_')}
function setResult(id,result){state[id]=state[id]||{};state[id].result=result;state[id].time=new Date().toISOString();save();renderItems();renderLocations();}
function setField(id,key,val){state[id]=state[id]||{};state[id][key]=val;save();}
function handlePhotos(id,files){state[id]=state[id]||{};state[id].photos=state[id].photos||[];[...files].slice(0,3).forEach(file=>{const r=new FileReader();r.onload=e=>{state[id].photos.push(e.target.result);save();renderItems();};r.readAsDataURL(file);});}
function submitInspection(){if(!currentLoc){toast('請先選擇巡檢點');return}const items=getItems(currentLoc);const unfinished=items.filter(it=>!state[it.id]?.result);const badMissing=items.filter(it=>state[it.id]?.result==='異常'&&(!state[it.id]?.note||!state[it.id]?.action));if(unfinished.length){if(!confirm(`尚有 ${unfinished.length} 項未判定，仍要送出嗎？`))return;}if(badMissing.length){toast('異常項目請填寫說明與處理方式');return}const now=new Date();const rec={id:'REC-'+now.getTime(),date:now.toLocaleDateString('zh-TW'),time:now.toLocaleTimeString('zh-TW'),community:document.getElementById('community').value||'',inspector:document.getElementById('inspector').value||'',shift:document.getElementById('shift').value,weather:document.getElementById('weather').value||'',location:currentLoc,items:items.map(it=>({...it,...(state[it.id]||{})}))};records.unshift(rec);save();toast('✅ 巡檢已送出並儲存在本機');renderLocations();showPage('locations');}
function updateStats(){const done=allItems.filter(it=>state[it.id]?.result).length;const bad=allItems.filter(it=>state[it.id]?.result==='異常').length;document.getElementById('stTotal').textContent=allItems.length;document.getElementById('stDone').textContent=done;document.getElementById('stBad').textContent=bad;document.getElementById('stPct').textContent=Math.round(done/allItems.length*100)+'%';}
function renderAbnormal(){const box=document.getElementById('abnormalList');const bad=allItems.filter(it=>['異常','待注意'].includes(state[it.id]?.result));if(!bad.length){box.innerHTML='<div class="empty">目前沒有異常或待注意項目</div>';return}box.innerHTML=bad.map(it=>{const s=state[it.id];return `<div class="abnormal"><b>${it.loc}｜${it.item}</b><br><span>${s.result}</span><p>${s.note||'未填說明'}</p><p>處理：${s.action||'未填'}</p>${(s.photos||[]).map(src=>`<img src="${src}" style="width:72px;height:72px;object-fit:cover;border-radius:10px;margin-right:6px">`).join('')}</div>`}).join('');}
function renderRecords(){const box=document.getElementById('recordList');if(!records.length){box.innerHTML='<div class="empty">尚無送出紀錄</div>';return}box.innerHTML=records.map(r=>`<div class="record"><b>${r.location}</b><br>${r.date} ${r.time}<br>人員：${r.inspector||'未填'}｜班別：${r.shift}<br>異常：${r.items.filter(x=>x.result==='異常').length} 項</div>`).join('')}
function exportCSV(){let rows=[['紀錄ID','日期','時間','社區','人員','班別','天氣','巡檢點','類別','項目','標準','判定','說明','處理方式','預計完成日','照片數']];records.forEach(r=>r.items.forEach(x=>rows.push([r.id,r.date,r.time,r.community,r.inspector,r.shift,r.weather,r.location,x.category,x.item,x.standard,x.result||'',x.note||'',x.action||'',x.due||'',(x.photos||[]).length])));let csv='\ufeff'+rows.map(row=>row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='社區巡檢紀錄.csv';a.click();}
function clearAll(){if(confirm('確定清除本機暫存與紀錄？')){localStorage.removeItem('inspectionState');localStorage.removeItem('inspectionRecords');state={};records=[];renderLocations();renderRecords();updateStats();toast('已清除')}}
renderLocations();updateStats();
</script>
</body>
</html>
