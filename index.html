<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>巡檢系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <h2>巡檢系統</h2>

  <button onclick="start()">開始巡檢</button>

  <script>
    async function initLIFF() {
      try {
        await liff.init({
          liffId: "2009930434-HhDufQN2"
        });
        console.log("LIFF OK");
      } catch (e) {
        console.error("LIFF error", e);
      }
    }

    function start() {
      alert("LIFF 已初始化，可進入系統");
    }

    window.onload = initLIFF;
  </script>
</body>
</html>
